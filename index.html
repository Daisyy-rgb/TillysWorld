<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilly's World</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#201d16;display:flex;min-height:100vh;font-family:sans-serif;}

/* ── SIDEBAR ──────────────────────────────────── */
.sidebar{width:220px;min-width:220px;background:#19160f;padding:1.4rem 0 1rem;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;border-right:1px solid rgba(255,255,255,.04);}
.sb-logo{padding:0 1.2rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:1.1rem;}
.sb-logo .ey{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,173,158,.4);margin-bottom:4px;}
.sb-logo .ti{font-family:'Cinzel',serif;font-size:15px;color:#e8e2d8;letter-spacing:.1em;}
.ng{margin-bottom:.3rem;}
.ngl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,173,158,.35);padding:.55rem 1.2rem .2rem;}
.ngl-sub{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(184,173,158,.22);padding:.4rem 1.4rem .1rem;}
.ni{display:flex;align-items:center;gap:8px;padding:.36rem 1.2rem;font-size:12px;color:#b8ad9e;cursor:pointer;border-left:2px solid transparent;user-select:none;transition:all .12s;}
.ni:hover{color:#fff;background:rgba(255,255,255,.04);}
.ni.active{color:#fff;border-left-color:#7b6fbb;background:rgba(123,111,187,.1);}
.nd{width:4px;height:4px;border-radius:50%;background:rgba(184,173,158,.3);flex-shrink:0;}
.ni.active .nd{background:#7b6fbb;}
.nadd{display:flex;align-items:center;gap:8px;padding:.32rem 1.2rem;font-size:11px;color:rgba(123,111,187,.7);cursor:pointer;transition:all .12s;}
.nadd:hover{color:#b0a8e8;}
.sb-bottom{margin-top:auto;padding:1rem 1.2rem 0;border-top:1px solid rgba(255,255,255,.06);}
.sb-status{font-size:10px;color:#888;margin-bottom:.5rem;min-height:14px;}
.sb-status.unsaved{color:#e0a020;}
.sb-status.saving{color:#7b6fbb;}
.sb-status.saved{color:#4a9960;}
.sb-status.error{color:#c04040;}
.sb-settings-btn{font-size:11px;color:rgba(184,173,158,.5);cursor:pointer;padding:4px 0;}
.sb-settings-btn:hover{color:#b8ad9e;}
.settings-panel{display:none;margin-top:.6rem;padding:.8rem;background:rgba(255,255,255,.05);border-radius:8px;}
.settings-panel label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#888;display:block;margin-bottom:4px;}
.settings-panel input{width:100%;font-size:11px;font-family:monospace;padding:5px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.12);background:#111;color:#ccc;margin-bottom:8px;}
.settings-panel button{font-size:11px;padding:5px 12px;border-radius:5px;border:none;background:#3C3489;color:#fff;cursor:pointer;}

/* ── NAV EDIT MODE ────────────────────────────── */
.ns-label-inp{background:none;border:none;border-bottom:1px solid rgba(255,255,255,.15);color:#c8c0b0;font-size:9px;letter-spacing:.22em;text-transform:uppercase;width:100%;padding:2px 0;font-family:sans-serif;outline:none;}
.ns-ctrl-row{display:flex;gap:3px;padding:2px 1.2rem .3rem;flex-wrap:wrap;}
.ns-ctrl-btn{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:rgba(184,173,158,.6);cursor:pointer;}
.ns-ctrl-btn:hover{background:rgba(255,255,255,.08);color:#b8ad9e;}
.ns-ctrl-btn.danger{border-color:rgba(240,149,149,.35);color:rgba(200,80,80,.8);}
.ns-ctrl-btn.danger:hover{background:rgba(163,45,45,.1);}
.grp-label-inp{background:none;border:none;border-bottom:1px solid rgba(255,255,255,.1);color:rgba(184,173,158,.45);font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:2px 0;font-family:sans-serif;outline:none;flex:1;min-width:0;}
.ns-add-row{display:flex;gap:5px;padding:.4rem 1.2rem;flex-wrap:wrap;}

/* ── EDIT MODE TOGGLE ─────────────────────────── */
.edit-toggle-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding:.7rem 1rem;background:rgba(255,255,255,.04);border-radius:8px;}
.edit-toggle-bar span{font-size:12px;color:#b8ad9e;}
.toggle-switch{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:#444;border-radius:10px;transition:background .2s;}
.toggle-thumb{position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;}
.toggle-switch input:checked~.toggle-track{background:#7b6fbb;}
.toggle-switch input:checked~.toggle-thumb{left:19px;}

/* ── MAIN ─────────────────────────────────────── */
.main{margin-left:220px;flex:1;padding:2rem 2.4rem 3rem;max-width:980px;}
.page{display:none;}
.page.active{display:block;}
.ph{margin-bottom:1.8rem;padding-bottom:1.1rem;border-bottom:1px solid rgba(255,255,255,.07);}
.ph h1{font-family:'Cinzel',serif;font-size:26px;font-weight:400;color:#e8e2d8;letter-spacing:.07em;}
.ph p{font-size:13px;color:rgba(184,173,158,.7);margin-top:4px;font-style:italic;}
.ph-edit-fields{display:flex;flex-direction:column;gap:6px;margin-top:.5rem;}
.ph-edit-fields input{font-size:13px;font-family:sans-serif;padding:5px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:#2e2a20;color:#e8e2d8;}

/* ── SECTION GRID ─────────────────────────────── */
.sections-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;align-items:start;}
.sec-cols-3{grid-column:span 3;}
.sec-cols-2{grid-column:span 2;}
.sec-cols-1{grid-column:span 1;}
@media(max-width:700px){.sections-grid{grid-template-columns:1fr;}.sec-cols-3,.sec-cols-2,.sec-cols-1{grid-column:span 1;}}
.sect-cols-btn{font-size:10px;padding:2px 5px;border-radius:3px;border:1px solid #ccc;background:#fff;cursor:pointer;color:#aaa;}
.sect-cols-btn.active{background:#3C3489;color:#fff;border-color:#3C3489;}

/* ── LORE CARDS ───────────────────────────────── */
.lb{margin-bottom:2rem;}
.lbt{font-family:'Cinzel',serif;font-size:15px;color:#c8c0b0;letter-spacing:.1em;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.07);}
.card{background:#ddd8d0;border-radius:10px;padding:1.4rem 1.6rem;margin-bottom:1rem;}
.card h2{font-family:'Cinzel',serif;font-size:16px;font-weight:500;color:#2e2820;margin-bottom:.65rem;}
.card h3{font-family:'Cinzel',serif;font-size:13px;color:#5a4e42;margin:1rem 0 .35rem;}
.card p{font-size:14px;line-height:1.75;color:#5a4e42;}
.card p+p{margin-top:.7rem;}
.card ul{list-style:none;padding:0;margin-top:.3rem;}
.card ul li{font-size:14px;color:#5a4e42;padding:3px 0 3px 16px;position:relative;line-height:1.6;}
.card ul li::before{content:'·';position:absolute;left:4px;color:#7b6fbb;}

/* ── EDIT CARD ────────────────────────────────── */
.edit-card{background:#ede8df;border-radius:10px;padding:1.2rem 1.4rem;margin-bottom:1rem;border:2px solid rgba(123,111,187,.3);}
.edit-card-head{display:flex;align-items:center;gap:6px;margin-bottom:.8rem;flex-wrap:wrap;}
.sect-type-badge{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#888;background:rgba(0,0,0,.08);padding:2px 7px;border-radius:4px;}
.ec-btn{font-size:11px;padding:3px 9px;border-radius:5px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#555;}
.ec-btn:hover{background:#f0f0f0;}
.ec-btn.danger{border-color:#F09595;background:#FCEBEB;color:#A32D2D;}
.ec-btn.danger:hover{background:#F7C1C1;}
.sect-title-inp{font-family:'Cinzel',serif;font-size:15px;width:100%;padding:5px 8px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;margin-bottom:.7rem;}
.sect-body-ta{width:100%;font-size:13px;font-family:'IM Fell English',serif;line-height:1.7;color:#2e2820;padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;min-height:90px;resize:vertical;}
.items-edit-wrap{display:flex;flex-direction:column;gap:6px;}
.item-edit-row{display:flex;gap:6px;align-items:flex-start;}
.item-edit-row input,.item-edit-row textarea{font-size:12px;font-family:sans-serif;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;}
.item-edit-row input{flex:1;}
.item-edit-row textarea{flex:1;min-height:52px;resize:vertical;}
.card-item-edit{background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #ddd;display:flex;flex-direction:column;gap:6px;flex:1;}
.small-add-btn{font-size:11px;color:#3C3489;background:none;border:1px dashed #AFA9EC;border-radius:6px;padding:5px 12px;cursor:pointer;margin-top:4px;width:100%;}
.page-add-btn{font-family:sans-serif;font-size:12px;color:#3C3489;background:none;border:1px dashed #AFA9EC;border-radius:8px;padding:7px 16px;cursor:pointer;margin-top:.5rem;}

/* ── GRIDS ────────────────────────────────────── */
.fairy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.75rem;}
.fairy-card{background:#ddd8d0;border-radius:8px;padding:1.1rem 1.2rem;}
.fairy-card h3{font-family:'Cinzel',serif;font-size:14px;color:#2e2820;margin-bottom:6px;}
.fairy-card p{font-size:13px;line-height:1.65;color:#5a4e42;}
.sigil-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;}
.sigil-card{background:#ddd8d0;border-radius:8px;padding:.75rem 1rem;text-align:center;font-family:'Cinzel',serif;font-size:13px;color:#2e2820;}
.sov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.75rem;}
.sov-card{background:#ddd8d0;border-radius:8px;padding:1rem 1.1rem;border:2px solid transparent;transition:all .14s;}
.sov-card.hd{cursor:pointer;}
.sov-card.hd:hover{transform:translateY(-2px);border-color:rgba(60,52,137,.35);box-shadow:0 4px 14px rgba(0,0,0,.22);}
.sov-card.ft{border-color:rgba(60,52,137,.4);background:#eae6f5;}
.sov-num{font-size:9px;color:#bbb;letter-spacing:.16em;text-transform:uppercase;margin-bottom:3px;}
.sov-cn{font-family:'Cinzel',serif;font-size:13px;color:#2e2820;margin-bottom:2px;}
.sov-cs{font-size:11.5px;color:#8a7e72;font-style:italic;}
.sov-lk{margin-top:6px;font-size:9px;color:#3C3489;letter-spacing:.12em;text-transform:uppercase;}
.sov-edit-card{background:#ede8df;border-radius:8px;padding:.9rem 1rem;border:2px solid rgba(123,111,187,.25);display:flex;flex-direction:column;gap:6px;}
.sov-edit-card input{font-size:12px;font-family:sans-serif;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;}
.sov-edit-card label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#999;}
.sov-edit-controls{display:flex;gap:5px;justify-content:flex-end;}
.deck-wrap{margin-bottom:2.5rem;}
.deck-title-inp{font-family:'Cinzel',serif;font-size:16px;background:#2e2a20;border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:5px 10px;color:#c8c0b0;width:auto;min-width:200px;outline:none;}
.deck-header-edit{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.07);}

/* ── STAR STEPS ───────────────────────────────── */
.step-list{display:flex;flex-direction:column;gap:.9rem;}
.step-card{background:#ddd8d0;border-radius:9px;padding:1.2rem 1.4rem;border-left:3px solid;}
.step-ch{display:flex;align-items:baseline;gap:10px;margin-bottom:.75rem;}
.step-nl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#bbb;}
.step-tt{font-family:'Cinzel',serif;font-size:15px;color:#2e2820;}
.abl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#3C3489;margin-bottom:3px;}
.dsl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#b83232;margin-top:9px;margin-bottom:3px;}
.stxt{font-size:13.5px;line-height:1.72;color:#5a4e42;}
.step-edit-card{background:#ede8df;border-radius:9px;padding:1.1rem 1.3rem;border-left:3px solid #7b6fbb;}
.step-edit-card input{font-size:12px;font-family:'Cinzel',serif;padding:5px 8px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;margin-bottom:6px;}
.step-edit-card .color-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.step-edit-card .color-row label{font-size:10px;color:#999;white-space:nowrap;}
.step-edit-card textarea{width:100%;font-size:12px;font-family:sans-serif;line-height:1.6;padding:6px 8px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;resize:vertical;min-height:72px;margin-bottom:4px;}
.step-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#3C3489;margin-bottom:3px;}
.step-lbl-d{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#b83232;margin-bottom:3px;margin-top:8px;}

/* ── CHAPTERS ─────────────────────────────────── */
.chap-card{background:#ddd8d0;border-radius:10px;padding:1.6rem 1.9rem;margin-bottom:1.2rem;}
.chap-ey{font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:#aaa;margin-bottom:5px;}
.chap-ti{font-family:'Cinzel',serif;font-size:22px;font-weight:400;color:#2e2820;margin-bottom:1rem;}
.chap-bd{font-size:14px;line-height:1.82;color:#5a4e42;}
.chap-bd p{margin-bottom:.75rem;}
.chap-edit-card{background:#ede8df;border-radius:10px;padding:1.3rem 1.5rem;margin-bottom:1.2rem;border:2px solid rgba(123,111,187,.3);}
.chap-edit-card input{font-size:13px;font-family:'Cinzel',serif;padding:5px 8px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;margin-bottom:8px;}
.chap-edit-card textarea{width:100%;font-size:13px;font-family:'IM Fell English',serif;line-height:1.75;padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;min-height:200px;resize:vertical;}

/* ── MISC ─────────────────────────────────────── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:rgba(184,173,158,.7);cursor:pointer;padding:5px 10px;border-radius:6px;margin-bottom:1.5rem;transition:all .13s;}
.back-btn:hover{color:#fff;background:rgba(255,255,255,.06);}
.ctable{width:100%;border-collapse:collapse;}
.ctable th{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#aaa;text-align:left;padding:6px 12px;border-bottom:1px solid rgba(0,0,0,.1);}
.ctable td{padding:8px 12px;font-size:14px;color:#5a4e42;border-bottom:1px solid rgba(0,0,0,.06);}
.ctable tr:last-child td{border-bottom:none;}
.cal-edit-wrap input,.cal-edit-wrap textarea{font-size:13px;font-family:sans-serif;padding:5px 9px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;margin-bottom:6px;}
.season-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.season-edit-row input{flex:1;font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;}

/* ── CHARACTER SHEET ──────────────────────────── */
.sheet-wrap{max-width:900px;}
.sheet-toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap;}
.mode-btn{font-size:12px;padding:6px 16px;border-radius:8px;border:1px solid #ccc;cursor:pointer;background:#fff;color:#555;}
.mode-btn.active{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;}
.tbtn{font-size:12px;padding:6px 16px;border-radius:8px;cursor:pointer;}
.tbtn-img{border:1px solid #AFA9EC;background:#3C3489;color:#fff;}
.tbtn-img:hover{background:#534AB7;}
.tbtn-del{border:1px solid #F09595;background:#FCEBEB;color:#A32D2D;}
.tbtn-del:hover{background:#F7C1C1;}
.sheet{background:#ddd8d0;border:1px solid #e0e0e0;border-radius:12px;padding:1.2rem 1.5rem;font-family:'IM Fell English',serif;position:relative;}
.sheet.vm .editable{display:none;}
.sheet.vm .display{display:block;}
.sheet.em .editable{display:block;}
.sheet.em .display{display:none;}
.top-label{font-size:11px;letter-spacing:.15em;color:#999;text-transform:uppercase;font-family:sans-serif;margin-bottom:4px;}
.char-number{font-family:'Cinzel',serif;font-size:48px;font-weight:400;color:#000;line-height:1;opacity:.18;position:absolute;top:2rem;right:2rem;}
.njp{font-size:13px;color:#aaa;font-family:sans-serif;margin-bottom:2px;}
.nen{font-family:'Cinzel',serif;font-size:32px;font-weight:400;color:#222;margin:0 0 4px;letter-spacing:.05em;}
.ntitle{font-size:15px;color:#666;font-style:italic;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #eee;}
.two-col{display:grid;grid-template-columns:1fr 200px;gap:1.2rem;margin-bottom:.8rem;}
.art-frame{border:4px solid #111;border-radius:6px;box-shadow:inset 0 0 0 2px #555,inset 0 0 0 5px #111;overflow:hidden;height:280px;position:relative;background:#111;}
.art-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%;color:#888;font-size:12px;font-family:sans-serif;text-align:center;padding:1rem;}
.art-img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.info-row{display:flex;gap:8px;margin-bottom:6px;font-size:14px;align-items:baseline;}
.info-label{color:#aaa;font-family:sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;min-width:90px;padding-top:2px;flex-shrink:0;}
.info-value{color:#222;font-size:14px;line-height:1.4;}
input[type=text],textarea{width:100%;font-size:13px;font-family:sans-serif;padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#f9f9f9;color:#222;}
textarea{resize:vertical;min-height:48px;}
.frow{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
.flabel{color:#aaa;font-family:sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;min-width:90px;flex-shrink:0;}
hr.div{border:none;border-top:1px solid #eee;margin:.6rem 0;}
.slabel{font-family:sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#bbb;margin-bottom:6px;}
.stat-name{font-family:sans-serif;font-size:12px;color:#666;min-width:130px;}
.stat-row-v{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.stat-bg{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;background:#3C3489;transition:width .2s;}
.stat-val{font-family:sans-serif;font-size:11px;color:#777;min-width:36px;text-align:right;white-space:nowrap;flex-shrink:0;}
.stat-row-e{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 8px;background:#f9f9f9;border-radius:8px;border:1px solid #eee;}
.stat-row-e input[type=text]{width:120px;flex-shrink:0;}
.stat-row-e input[type=range]{flex:1;min-width:60px;}
.rmbtn{flex-shrink:0;width:28px;height:28px;border-radius:6px;border:1px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;line-height:1;}
.rmbtn:hover{background:#F7C1C1;}
.add-btn{font-family:sans-serif;font-size:12px;color:#3C3489;background:none;border:1px dashed #AFA9EC;border-radius:8px;padding:6px 14px;cursor:pointer;margin-top:4px;width:100%;}
.karma-track{width:100%;height:10px;border-radius:5px;overflow:hidden;display:flex;margin:8px 0 4px;}
.karma-evil{height:100%;background:#A32D2D;transition:width .15s;}
.karma-good{height:100%;background:#185FA5;transition:width .15s;}
.karma-labels{display:flex;justify-content:space-between;font-size:10px;font-family:sans-serif;}
.karma-label-evil{color:#A32D2D;}
.karma-label-good{color:#185FA5;}
.karma-value{font-family:'Cinzel',serif;font-size:18px;font-weight:400;}
.kbadge{display:inline-block;background:#EEEDFE;color:#3C3489;font-family:sans-serif;font-size:11px;padding:3px 10px;border-radius:6px;margin-left:8px;vertical-align:middle;}
.item-tag{display:inline-flex;align-items:center;gap:6px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:sans-serif;color:#666;padding:3px 10px;margin:3px 3px 3px 0;}

let CONTENT = {"charOrder":["tilly"],"charGroups":[{"id":"cg_heroes","label":"Heroes","chars":["tilly"]},{"id":"cg_villains","label":"Villains","chars":[]}],"navSections":[{"id":"ns_chars","label":"Characters","type":"characters"},{"id":"ns_world","label":"The World","type":"lore","pages":["world","magic","fairies","artifacts","sovereignties","id1781918181394suaw"]},{"id":"ns_story","label":"Story","type":"lore","pages":["chapters"]},{"id":"ns_ref","label":"Reference","type":"lore","pages":["calendar"]}],"arcanaDecks":[{"id":"deck_major","label":"Major Arcana","cards":[{"num":"0","card":"The Fool","name":"Sovereign of Wandering","detail":false,"featured":false,"stepsPageId":"id1781818189514o5m5"},{"num":"I","card":"The Magician","name":"Sovereign of Direction","detail":false,"featured":false,"stepsPageId":"id17818181946405l7w"},{"num":"II","card":"The High Priestess","name":"Sovereign of Secrets","detail":false,"featured":false,"stepsPageId":"id1781817611094bo0d"},{"num":"III","card":"The Empress","name":"Sovereign of Growth","detail":false,"featured":false,"stepsPageId":"id1781818197041khuy"},{"num":"IV","card":"The Emperor","name":"Sovereign of Command","detail":false,"featured":false,"stepsPageId":"id17818179906061isv"},{"num":"V","card":"The Hierophant","name":"Sovereign of Tradition"},{"num":"VI","card":"The Lovers","name":"Sovereign of Bonds"},{"num":"VII","card":"The Chariot","name":"Sovereign of Motion"},{"num":"VIII","card":"Strength","name":"Sovereign of Force"},{"num":"IX","card":"The Hermit","name":"Sovereign of Isolation"},{"num":"X","card":"Wheel of Fortune","name":"Sovereign of Luck"},{"num":"XI","card":"Justice","name":"Sovereign of Balance"},{"num":"XII","card":"The Hanged Man","name":"Sovereign of Sacrifice"},{"num":"XIII","card":"Death","name":"Sovereign of Endings"},{"num":"XIV","card":"Temperance","name":"Sovereign of Restraint"},{"num":"XV","card":"The Devil","name":"Sovereign of Temptation"},{"num":"XVI","card":"The Tower","name":"Sovereign of Destruction"},{"num":"XVII","card":"The Star","name":"Sovereign of Hope","detail":true,"featured":true,"stepsPageId":"the-star"},{"num":"XVIII","card":"The Moon","name":"Sovereign of Illusion","detail":true,"featured":true,"stepsPageId":"id1781818213597s6ia"},{"num":"XIX","card":"The Sun","name":"Sovereign of Radiance"},{"num":"XX","card":"Judgement","name":"Sovereign of Awakening"},{"num":"XXI","card":"The World","name":"Sovereign of Completion"}]}],"chars":{"tilly":{"id":"tilly","number":"01","nameJp":"ティリー","nameEn":"Tilly","title":"Eustace's beloved child","arcanaLabel":"Arcana","arcanaValue":"","stepLabel":"Step","stepValue":"","imgUrl":"https://i.imgur.com/RqDz8JN.jpeg","appearance":"Short shaggy dark auburn hair\nWarm amber eyes\nWorn vest · linen shirt · old boots","quote":"Born in Highsun, 981, of the Fourth Age, Tilly lost both her parents and older siblings in an accident at a young age. Orphaned and alone on the streets of Alderrdeen, a local man named Eustace took her in.\nNow twelve, she runs his antique shop, and she has never once put herself first. This will cause problems for her later on down the road.\nThere are three prices for everything in Eustace's Oddities. The one she quietly offers to people who can't afford it, the fair price for everyone else, and the one she quotes to people with more money than they know what to do with. She has a gift for knowing exactly what something is worth — and exactly what someone can pay. She has never once thought of this as remarkable, but her grandfather thinks otherwise.\nDespite everything she has already lost, Tilly chooses kindness above all else, and it is her hope that she will always make this decision.","footer1":"Alderrdeen Township","footer2":"993, Fourth Age — Springtide","karma":425,"basicInfo":[{"label":"Age","value":"12"},{"label":"Race","value":"Human"},{"label":"Origin","value":"Orphaned from a young age, Tilly was raised in an antique shop by a local man who took her in."},{"label":"Guardian","value":"Eustace (Grandfather)"},{"label":"Residence","value":"Eustace's Oddities"},{"label":"Alignment","value":"Chaotic Good"}],"stats":[{"name":"Kindness","val":88},{"name":"Courage","val":80},{"name":"Wit","val":64},{"name":"Stubbornness","val":91},{"name":"Luck","val":49},{"name":"Renown","val":1}],"customSections":[{"title":"Items","items":[{"name":"4 Sonens","note":"(20 of these make up a single Aurem)"},{"name":"7 Trins","note":"(100 of these make up a single Sonen)"}]}]}},"pages":{"world":{"title":"The world through the ages","subtitle":"","navLabel":"World History","sections":[{"id":"id1781842869999qpeu","title":"the First Age","type":"text","cols":3,"body":"*\"In the beginning, there was one. She was a small thing, without name and without meaning. Alone in the dark, she cradled something smaller than even herself.\n\nShe held in her hands a jagged orb. Worthless, and overlooked by her peers, she clung desperately to this jagged orb, and refused to let go.\n\nFinally safe, she allowed herself a momentary reprieve. After a short millennia, she woke to find the orb beating in tandem with her own heartbeat.\n\nFor the first time in a long time, she felt something she had longed for. She clawed at this orb with desperate fingers, and where her nails dragged through the stone, deep grooves followed, waiting to be filled. Her grip left marks, and those marks became the trenches of the deep, the places where the world still remembers being held. She tore at her own hair, and where it fell, the first forests reached skyward to console her.\n\nThen she wept.\n\nWhere her tears fell, the oceans filled. Where they ran through the grooves her fingers had carved out of the earth, rivers followed.\n\nShe let out a shaky breath, and the winds began to move. She shivered, and deep beneath the surface, the earth trembled with her. She pressed her cheek against the cold orb, and it grew warm to its core.\n\nThe girl tried to straighten her body for the first time in many years, and where her spine had curved, the mountains rose.\n\nWhen she finally spoke her thanks, her voice became the thunder. And when she fell silent, she offered a prayer to this world.\n\nNext, she offered up her eyes. One became the sun, and the other became the moon. And they have watched over everything she made from herself, for herself, in the long years since she stopped watching.\"*\n\n--------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------\n\n'This tale is the only record of the First Age that remains. There is no known author, and the oldest of Fairies refuse to comment on this excerpt. Those with knowledge of the First Age are invited to present their findings to **The World's Archive of Lost Ages**, located in **Acrine**, capital of the **Kingdom of Bratis**. A reward of 50 **Aurems **will be offered for any findings deemed significant by the Archive. Safe passage to and from the **Kingdom of Bratis** is guaranteed to all those who seek the Archive in good faith. **The World** wishes to know how it began.'"},{"id":"w1","title":"The second age","type":"text","cols":3,"body":"The Second Age began not with a proclamation, but with a single, brave footstep.\n\nHumanity crawled out from the dark safety of their caves, and into the blinding light. Blinking, squinting, and uncertain of the outside world, they found that they were not alone. The Fairies, which are speculated to have found this world near the end of the First Age, were awaiting the arrival of their human counterparts. The Fairies taught humanity all that they knew about the world, and in turn, humanity shared their findings with the Fairies. Together, the two factions spread throughout the neighboring valleys, mountains, and forests, as they lived in peace. Some scholars argue that what humanity and fairy kind had actually developed was a symbiotic relationship, but others yet would argue that a fairy is just a larger, more intimidating human.\n\nThis peace lasted for a short century, and this is when Scala made himself known to the world below.\n\nFrom a false heaven so high above the world that none could see it, let alone reach it, the God of Fate began to write his story. A predetermined path for every soul that breathed beneath his gaze. None were asked, let alone consulted. The course of every life was decided before it had even begun, and nothing could be done to change it.\n\nNone could reach him. None could challenge him. He was simply too far above the world below.\n\nUntil something in the world disagreed.\n\nWithout warning or explanation, the figure of a nameless woman rose from what we believe to be the current day **Gulf of Galsevain**.  She is said to have reached Scala's false Heaven with her bare hands. She pried Scala from his throne, and threw him to the Earth below. The impact of this caused a tremor to travel across the lands, and **Fairy Fountains** began to appear at random. Their waters carried within them something extraordinary; the power to tear any object free from fate entirely. To this day, nobody knows who this figure was, and when questioned, any and all fairies refuse to comment.\n\nThree figures found these fountains, and submerged themselves in their waters before the final confrontation. Caedron Ul, King of Humanity. Titania, Queen of the Fairies. And a fragment of Scala himself, who had broken away from his origin and chosen, for reasons nobody has ever fully understood, to stand against it.\n\nThe waters changed them. Made them into something beyond what they had been. Something capable of what came next.\n\nTogether, the three of them cut Scala down.\n\nWith his death came freedom. Fate dissolved. Every living thing was suddenly, terrifyingly free to choose its own path.\n\nChaos followed shortly after."},{"id":"w2","title":"The Mother Goddess","type":"text","cols":3,"body":"The Mother Goddess predates God entirely. Fairies are her children. She allied with the King of Humanity and the Fairy Paragon to defeat God, but spent everything in the process and fell into a deep sleep.\n\nAs part of their agreement she still sends her essence into the world while sleeping — this manifests as Fairy Fountains, which appear randomly. Anything submerged in a Fairy Fountain gains magical properties. They are essentially her dreams bleeding through into the waking world.\n\nMost humans don't know she exists. Even most Fairies have forgotten her. The wealthy hoard Fairy Fountains, draining them for personal use. Finding one before the rich claim it is nearly impossible."},{"id":"w3","title":"Notable Locations","type":"cards","cols":3,"items":[{"name":"Alderrdeen Township","body":"The city where the story begins. Cobblestone streets, candlelight, merchant stalls, nobles who hoard Fairy Fountains. Home to Eustace's Oddities."}]}]},"magic":{"title":"Magic System","subtitle":"Magic directs — it does not create","navLabel":"Magic System","sections":[{"id":"m1","title":"The Principle","type":"text","cols":3,"body":"Magic directs — it does not create. You cannot conjure something from nothing. You redirect forces that already exist in the world.\n\nMagic is performed by drawing sigil circles. Each sigil represents a fundamental force. Combinations of sigils create instructions. To make fire from nothing requires combining Air, Motion/Force, Heat, Direction, and Containment sigils — five sigils combined correctly just to produce something resembling a fireball.\n\nRegular magic takes years of practice to master. Big spells can take weeks to prepare. Magic is used mostly for small daily tasks."},{"id":"m2","title":"Fundamental Forces (Sigils)","type":"tags","cols":3,"items":["Air","Water","Earth","Heat","Motion / Force","Structural","Botanical","Sensory","Vital"]},{"id":"m3","title":"Schools of Magic","type":"list","cols":3,"items":["Elemental Direction — air, water, earth, fire","Kinetics — force, motion, speed","Structural — reinforcement, reduction, expansion","Botanical — growth and decay","Sensory — light, sound, temperature","Vital — the body's own energy, heavily restricted"]},{"id":"m4","title":"The Binding & Forbidden Magic","type":"text","cols":3,"body":"After God's death, the three rebels imposed The Binding — limiting magic to sanctioned, caged use. Forbidden magic draws from the raw power released when God fell. It is faster, stronger, and requires no years of practice.\n\nThe moment someone uses forbidden magic, every Fairy in the vicinity feels it. They come. They punish — killing some, turning others into monsters. No mercy. No context. No exceptions.\n\nForbidden mages have survived by studying Fairy behavior for centuries. They have mapped territories, travel speeds, and patterns. They also hide behind fragments of the Skeleton Key, which drowns out the signal of their magic entirely."},{"id":"m5","title":"Arcanists","type":"text","cols":3,"body":"Magic users who have chosen a Sovereignty — a discipline that shapes both their abilities and their soul over time — are called Arcanists. Each Sovereignty has 10 Steps plus a Step 0, numbered from Step 0 to Step X (nearly unreachable pinnacle). Sanctioned practitioners change slowly. Forbidden magic practitioners change much faster and far more dangerously."}]},"fairies":{"title":"Fairies & Towers","subtitle":"Children of the Mother Goddess","navLabel":"Fairies & Towers","sections":[{"id":"f1","title":"About Fairies","type":"text","cols":3,"body":"Fairies are the Mother Goddess's children — biologically identical regardless of type, but culturally divided. They can only use large amounts of magic when channeling it through a human.\n\nFairies are deeply racist toward one another despite being biologically the same. Many have forgotten the Mother Goddess. Fairies manifest in different forms when enforcing The Binding — some as storms, some as humans, others as shapeless monsters."},{"id":"f2","title":"Types of Fairies","type":"cards","cols":3,"items":[{"name":"Djinn","body":"Reside in Fairy Towers. Anyone who clears a tower to the top claims the Djinn's treasure and a piece of their power, usually as a Living Artifact."},{"name":"Daemons","body":"Offer power through deals, taking body parts, memories, emotions, firstborn children, or other personal costs in exchange."},{"name":"Angels","body":"Give power only to their most devout followers."},{"name":"Others (In Development)","body":"Asura, Devas, Nymphs, Spirits, Wraiths, Shades. Each gives magic away differently. Some are malicious."}]},{"id":"f3","title":"Fairy Towers","type":"text","cols":3,"body":"Enormously difficult to clear. Even kings wouldn't attempt them — the cost in lives would be catastrophic. This makes them the great equalizer: no amount of wealth or power substitutes for the skill and luck required to reach the top alone.\n\nEach tower is different. Each Djinn is different. The Living Artifact rewarded varies by tower."}]},"artifacts":{"title":"Living Artifacts","subtitle":"Objects that contain a Fairy and hold one spell or power","navLabel":"Living Artifacts","sections":[{"id":"a0","title":"","type":"text","cols":3,"body":"Living Artifacts contain a Fairy and hold one spell or power within them. Clearing a Fairy Tower earns one. They are extraordinarily rare and valuable."},{"id":"a1","title":"Eustace's Sword","type":"text","cols":3,"body":"Contained a fire Djinn. Every swing released flame. Eustace earned it in his youth clearing a tower. He kept it secret for decades. He spent it protecting Tilly at the end of Chapter I."},{"id":"a2","title":"The Skeleton Key","type":"text","cols":3,"body":"The finger of the King of Humanity, who threw himself into a Fairy Fountain and made every part of his body holy. Allows travel through unseen doorways — any door leads to any other door, unpredictably. The longer it is used the more it infects the user's body. Fused to Tilly's right hand."},{"id":"a3","title":"Deeper Significance (Skeleton Key)","type":"text","cols":3,"body":"Each piece of the King's body resonates loudly with Fairies — not as a threat, but as something sacred. This has an unintended effect: it drowns out the signal of forbidden magic being used nearby. Whoever holds a fragment can use forbidden magic without Fairy detection.\n\nThe Kingdom holds half the fragments (believing them simply powerful relics). Forbidden mages hold the other half (knowing exactly what they do). Tilly holds one piece neither side has acquired. She is now caught between two forces who want her — for different reasons, neither of which they will tell her plainly."}]},"sovereignties":{"title":"Arcana","subtitle":"Named after the Tarot. Each has Steps 0–X.","navLabel":"Arcana","pageType":"arcana"},"the-star":{"title":"The Star","subtitle":"Sovereign of Hope · XVII of the Major Arcana","navLabel":"The Star Steps","pageType":"steps","steps":[{"step":0,"title":"Candlebearer","color":"#94a3b8","ability":"A faint warm light emanates from the Arcanist that wind and water cannot extinguish. Small radius. Always present. Can be dimmed by will. In complete darkness it's the difference between seeing and not seeing.","downside":"They begin sleeping later than usual. Nothing dramatic yet."},{"step":1,"title":"Omen-Reader","color":"#86efac","ability":"They begin noticing signs others miss. A fighter's weight shifting before they throw a punch. A mage's breath changing before they draw a sigil. They see it coming a half second before it arrives. In a brawl a half second is everything.","downside":"They begin feeling the emotions of people around them without meaning to. Someone nearby is grieving and they feel it like pressure behind their eyes. They can't turn it off yet."},{"step":2,"title":"Stargazer","color":"#67e8f9","ability":"Their light has developed an edge. They can focus it into a narrow beam — not enough to burn yet, but enough to blind someone momentarily. They can also project it as a short burst in all directions, disorienting multiple enemies at once. By studying the night sky for an hour they gain a vague sense of what tomorrow holds for themselves or someone nearby.","downside":"They can no longer lie convincingly. Their light flickers almost imperceptibly when they say something untrue. Animals notice first. Then perceptive people."},{"step":3,"title":"Fate-Charter","color":"#a78bfa","ability":"They begin to read the immediate future in combat with frightening accuracy. Not minutes ahead — seconds. The next blow. The next step. The next breath. They move through a fight like water finding its path, never quite where the attack lands. They aren't faster than their opponents. They simply aren't there when the hit arrives. They can also sense when someone nearby is at a turning point in their life.","downside":"They are inexplicably drawn to people who are suffering. Strangers in pain find them. They cannot walk past someone in genuine despair without stopping. This is not a choice."},{"step":4,"title":"Lodestar","color":"#fbbf24","ability":"They can now project their light as a physical force. A concentrated pulse that hits like a shove — enough to knock someone off their feet or send a weapon spinning out of a hand. It can be fired repeatedly but costs genuine effort. Lost things also find their way to them — a missing person wanders past them on the street, a stolen object turns up nearby.","downside":"They stop being able to sustain hatred. They can be furious. Devastated. But hatred dissolves in them like salt in water."},{"step":5,"title":"Scribe of Skies","color":"#f97316","ability":"Their body has begun to change. Bones subtly denser. Reflexes sharpened beyond normal human limits without any training to explain it. The road is rewriting them from the inside. They hit harder than they should for their size and recover from impacts faster than makes sense. They also always know the broad shape of fate moving around them — who is in danger, where hope is concentrated. Always on. Cannot be turned off.","downside":"They stop needing to eat as much. A meal every few days sustains them. People who know them well begin to notice they never seem hungry."},{"step":6,"title":"Astrologer of Ruin","color":"#ef4444","ability":"They can see the threads of fate connecting people in a fight. Who is about to make a fatal mistake. Where the turning point of the battle is. They only need to pull the right thread at the right moment and watch everything unravel. They can also hear wishes — not spoken ones, the ones people carry silently. With focus they can isolate a single person's deepest want.","downside":"They begin to glow faintly in complete darkness. They cannot control it."},{"step":7,"title":"Living Constellation","color":"#ec4899","ability":"Their light has become something altogether different. They can shape it into walls of blazing radiance that physical weapons cannot pass through. Beams that strike with the force of a battering ram. A corona of burning light around their body that makes close combat deeply unpleasant. Allies near them feel steadier and harder to break. Enemies feel watched from very far away and found wanting.","downside":"Their tears are luminescent. They cannot hide grief. It literally shines out of them."},{"step":8,"title":"Terror of the Void","color":"#8b5cf6","ability":"Once per fight they can stop time for a single breath. In that breath they can move, redirect, reposition, pull someone out of the path of something unsurvivable. When time resumes nobody saw them move. Their body now heals at a rate that is difficult to explain — cuts close within minutes, broken bones within hours. They are becoming very hard to kill.","downside":"They have begun to forget small human things. The taste of their favourite food. The sound of a voice they loved. Small human details blur while cosmic ones sharpen."},{"step":9,"title":"Sovereign of Hope","color":"#3b82f6","ability":"They are no longer entirely fighting with a body. They are fighting with a concept. Their strikes carry weight beyond physical force — a blow doesn't just break bone, it breaks something in the spirit of whoever receives it. Anyone who has truly given up and comes near them feels something shift — the genuine sense that one more try is worth it. No range limit. Cannot be resisted. It has ended sieges. Their light can be seen from miles away if fully released.","downside":"They are no longer aging. They will outlive everyone they love unless something kills them first. They are beginning to understand what that means."},{"step":10,"title":"The Star","color":"#e2e8f0","ability":"There are no reliable accounts of a Star in combat because nothing that has ever fought one has survived to describe it coherently. What fragments exist speak of light that rewrites what it touches. Of wounds that simply cease to exist. Of enemies who stopped fighting not because they were defeated but because in the presence of a Star the concept of fighting seemed very small and very far away. A Star does not win battles. A Star ends them.","downside":"They are still here. Still themselves. But when they look at the people around them there is something in their eyes that wasn't there before. A distance. Not coldness. But they are seeing something the rest of the world cannot see yet. And sometimes when someone speaks to them there is a moment — just a breath — before they remember to respond like a person."}]},"chapters":{"title":"Chapters","subtitle":"Spring of the 993rd Free Year","navLabel":"Chapters","pageType":"chapters"},"calendar":{"title":"Calendar & Currency","subtitle":"The Free Calendar counts from the death of God","navLabel":"Calendar & Currency","pageType":"calendar"},"id1781817611094bo0d":{"title":"The High Priestess","subtitle":"Sovereignty of Secrets · II","navLabel":"The High Priestess Steps","pageType":"steps","steps":[{"step":0,"title":"","color":"#94a3b8","ability":"","downside":""},{"step":1,"title":"","color":"#86efac","ability":"","downside":""},{"step":2,"title":"","color":"#67e8f9","ability":"","downside":""},{"step":3,"title":"","color":"#a78bfa","ability":"","downside":""},{"step":4,"title":"","color":"#fbbf24","ability":"","downside":""},{"step":5,"title":"","color":"#f97316","ability":"","downside":""},{"step":6,"title":"","color":"#ef4444","ability":"","downside":""},{"step":7,"title":"","color":"#ec4899","ability":"","downside":""},{"step":8,"title":"","color":"#8b5cf6","ability":"","downside":""},{"step":9,"title":"","color":"#3b82f6","ability":"","downside":""},{"step":10,"title":"","color":"#e2e8f0","ability":"","downside":""}]},"id17818179906061isv":{"title":"The Emperor","subtitle":"Sovereignty of Command · IV","navLabel":"The Emperor Steps","pageType":"steps","steps":[{"step":0,"title":"","color":"#94a3b8","ability":"","downside":""},{"step":1,"title":"","color":"#86efac","ability":"","downside":""},{"step":2,"title":"","color":"#67e8f9","ability":"","downside":""},{"step":3,"title":"","color":"#a78bfa","ability":"","downside":""},{"step":4,"title":"","color":"#fbbf24","ability":"","downside":""},{"step":5,"title":"","color":"#f97316","ability":"","downside":""},{"step":6,"title":"","color":"#ef4444","ability":"","downside":""},{"step":7,"title":"","color":"#ec4899","ability":"","downside":""},{"step":8,"title":"","color":"#8b5cf6","ability":"","downside":""},{"step":9,"title":"","color":"#3b82f6","ability":"","downside":""},{"step":10,"title":"","color":"#e2e8f0","ability":"","downside":""}]},"id1781818189514o5m5":{"title":"The Fool","subtitle":"Sovereignty of Wandering · 0","navLabel":"The Fool Steps","pageType":"steps","steps":[{"step":0,"title":"","color":"#94a3b8","ability":"","downside":""},{"step":1,"title":"","color":"#86efac","ability":"","downside":""},{"step":2,"title":"","color":"#67e8f9","ability":"","downside":""},{"step":3,"title":"","color":"#a78bfa","ability":"","downside":""} or":"#ec4899","ability":"","downside":""},{"step":8,"title":"","color":"#8b5cf6","ability":"","downside":""},{"step":9,"title":"","color":"#3b82f6","ability":"","downside":""},{"step":10,"title":"","color":"#e2e8f0","ability":"","downside":""}]},"id1781818213597s6ia":{"title":"The Moon","subtitle":"Sovereignty of Illusion · XVIII","navLabel":"The Moon Steps","pageType":"steps","steps":[{"step":0,"title":"","color":"#94a3b8","ability":"","downside":""},{"step":1,"title":"","color":"#86efac","ability":"","downside":""},{"step":2,"title":"","color":"#67e8f9","ability":"","downside":""},{"step":3,"title":"","color":"#a78bfa","ability":"","downside":""},{"step":4,"title":"","color":"#fbbf24","ability":"","downside":""},{"step":5,"title":"","color":"#f97316","ability":"","downside":""},{"step":6,"title":"","color":"#ef4444","ability":"","downside":""},{"step":7,"title":"","color":"#ec4899","ability":"","downside":""},{"step":8,"title":"","color":"#8b5cf6","ability":"","downside":""},{"step":9,"title":"","color":"#3b82f6","ability":"","downside":""},{"step":10,"title":"","color":"#e2e8f0","ability":"","downside":""}]},"id1781918181394suaw":{"title":"New Page","subtitle":"","navLabel":"Civilizations","pageType":"lore","sections":[]}},"starSteps":[{"step":0,"title":"Candlebearer","color":"#94a3b8","ability":"A faint warm light emanates from the Arcanist that wind and water cannot extinguish. Small radius. Always present. Can be dimmed by will. In complete darkness it's the difference between seeing and not seeing.","downside":"They begin sleeping later than usual. Nothing dramatic yet."},{"step":1,"title":"Omen-Reader","color":"#86efac","ability":"They begin noticing signs others miss. A fighter's weight shifting before they throw a punch. A mage's breath changing before they draw a sigil. They see it coming a half second before it arrives. In a brawl a half second is everything.","downside":"They begin feeling the emotions of people around them without meaning to. Someone nearby is grieving and they feel it like pressure behind their eyes. They can't turn it off yet."},{"step":2,"title":"Stargazer","color":"#67e8f9","ability":"Their light has developed an edge. They can focus it into a narrow beam — not enough to burn yet, but enough to blind someone momentarily. They can also project it as a short burst in all directions, disorienting multiple enemies at once. By studying the night sky for an hour they gain a vague sense of what tomorrow holds for themselves or someone nearby.","downside":"They can no longer lie convincingly. Their light flickers almost imperceptibly when they say something untrue. Animals notice first. Then perceptive people."},{"step":3,"title":"Fate-Charter","color":"#a78bfa","ability":"They begin to read the immediate future in combat with frightening accuracy. Not minutes ahead — seconds. The next blow. The next step. The next breath. They move through a fight like water finding its path, never quite where the attack lands. They aren't faster than their opponents. They simply aren't there when the hit arrives. They can also sense when someone nearby is at a turning point in their life.","downside":"They are inexplicably drawn to people who are suffering. Strangers in pain find them. They cannot walk past someone in genuine despair without stopping. This is not a choice."},{"step":4,"title":"Lodestar","color":"#fbbf24","ability":"They can now project their light as a physical force. A concentrated pulse that hits like a shove — enough to knock someone off their feet or send a weapon spinning out of a hand. It can be fired repeatedly but costs genuine effort. Lost things also find their way to them — a missing person wanders past them on the street, a stolen object turns up nearby.","downside":"They stop being able to sustain hatred. They can be furious. Devastated. But hatred dissolves in them like salt in water."},{"step":5,"title":"Scribe of Skies","color":"#f97316","ability":"Their body has begun to change. Bones subtly denser. Reflexes sharpened beyond normal human limits without any training to explain it. The road is rewriting them from the inside. They hit harder than they should for their size and recover from impacts faster than makes sense. They also always know the broad shape of fate moving around them — who is in danger, where hope is concentrated. Always on. Cannot be turned off.","downside":"They stop needing to eat as much. A meal every few days sustains them. People who know them well begin to notice they never seem hungry."},{"step":6,"title":"Astrologer of Ruin","color":"#ef4444","ability":"They can see the threads of fate connecting people in a fight. Who is about to make a fatal mistake. Where the turning point of the battle is. They only need to pull the right thread at the right moment and watch everything unravel. They can also hear wishes — not spoken ones, the ones people carry silently. With focus they can isolate a single person's deepest want.","downside":"They begin to glow faintly in complete darkness. They cannot control it."},{"step":7,"title":"Living Constellation","color":"#ec4899","ability":"Their light has become something altogether different. They can shape it into walls of blazing radiance that physical weapons cannot pass through. Beams that strike with the force of a battering ram. A corona of burning light around their body that makes close combat deeply unpleasant. Allies near them feel steadier and harder to break. Enemies feel watched from very far away and found wanting.","downside":"Their tears are luminescent. They cannot hide grief. It literally shines out of them."},{"step":8,"title":"Terror of the Void","color":"#8b5cf6","ability":"Once per fight they can stop time for a single breath. In that breath they can move, redirect, reposition, pull someone out of the path of something unsurvivable. When time resumes nobody saw them move. Their body now heals at a rate that is difficult to explain — cuts close within minutes, broken bones within hours. They are becoming very hard to kill.","downside":"They have begun to forget small human things. The taste of their favourite food. The sound of a voice they loved. Small human details blur while cosmic ones sharpen."},{"step":9,"title":"Sovereign of Hope","color":"#3b82f6","ability":"They are no longer entirely fighting with a body. They are fighting with a concept. Their strikes carry weight beyond physical force — a blow doesn't just break bone, it breaks something in the spirit of whoever receives it. Anyone who has truly given up and comes near them feels something shift — the genuine sense that one more try is worth it. No range limit. Cannot be resisted. It has ended sieges. Their light can be seen from miles away if fully released.","downside":"They are no longer aging. They will outlive everyone they love unless something kills them first. They are beginning to understand what that means."},{"step":10,"title":"The Star","color":"#e2e8f0","ability":"There are no reliable accounts of a Star in combat because nothing that has ever fought one has survived to describe it coherently. What fragments exist speak of light that rewrites what it touches. Of wounds that simply cease to exist. Of enemies who stopped fighting not because they were defeated but because in the presence of a Star the concept of fighting seemed very small and very far away. A Star does not win battles. A Star ends them.","downside":"They are still here. Still themselves. But when they look at the people around them there is something in their eyes that wasn't there before. A distance. Not coldness. But they are seeing something the rest of the world cannot see yet. And sometimes when someone speaks to them there is a moment — just a breath — before they remember to respond like a person."}],"chapters":[{"number":"I","title":"The Skeleton Key","body":"Tilly works the counter at Eustace's Oddities. A worn-down adventurer comes in looking at swords. She reads him immediately — no money, genuine need — and sells him one for practically nothing. Then a noble walks in. Same product. She sells it for ten times the price without blinking.\n\nShe visits Eustace, who is bedridden. He coughs. She decides to find a Fairy Fountain to enchant his medicine and heal him. She searches the outskirts of Alderrdeen all day. Beautiful landscapes. No fountain. The wealthy have claimed them all.\n\nReturning home hungry, she steals bread from a market stall. Guards give chase. She rounds a corner into an alley and nearly steps on a dying man. He begs her not to give him away. She throws a tarp over him and acts casual.\n\nTwo guard groups converge — one chasing a bread thief, one hunting someone who escaped with a Living Artifact. The second group waves the first away. Tilly is alone with the dying man.\n\nHe presses something into her hand — a long pale bone-like key. It fuses to her finger before she can react. He tells her to run. It doesn't matter where. Just don't let it fall into the wrong hands. Then he is gone.\n\nTilly returns home. She has only moments with Eustace before guards arrive demanding the artifact. It won't leave her hand. They decide to take the finger. Eustace rises from his bed, unwraps his Living Artifact, and the sword erupts in flame.\n\n\"You will do no such thing.\"\n\nHe holds them off. Tilly is pushed through the back door. Eustace throws his sword through just before it closes. The guards who follow find themselves in the back alleyway. Tilly finds herself somewhere else entirely.\n\nA snowfield. Silent. Cold. No city. No guards. No grandfather. Just Tilly, alone, with a dying flaming sword in the snow and a dead king's finger fused to her hand.\n\nThis is when she becomes a Candlebearer."}],"calendarNote":"The calendar counts from the death of God — A.G. (Anno God's-death). Current date: Spring of the 993rd Free Year (993 A.G. — Springtide).","seasons":["Springtide","Highsun","Dimfall","Deeprest"],"currency":[{"name":"Aurem","material":"Gold","exchange":"Highest denomination"},{"name":"Sonen","material":"Silver","exchange":"20 per Aurem"},{"name":"Trin","material":"Copper","exchange":"100 per Sonen · 2000 per Aurem"}]};

// ── MIGRATION (ensures old saves gain new fields) ─────
function migrateContent(){
  if(!CONTENT.navSections) CONTENT.navSections=[{id:'ns_chars',label:'Characters',type:'characters'},{id:'ns_world',label:'The World',type:'lore',pages:['world','magic','fairies','artifacts','sovereignties']},{id:'ns_story',label:'Story',type:'lore',pages:['chapters']},{id:'ns_ref',label:'Reference',type:'lore',pages:['calendar']}];
  if(!CONTENT.charGroups) CONTENT.charGroups=[{id:'cg_heroes',label:'Heroes',chars:[...(CONTENT.charOrder||[])]}];
  if(!CONTENT.arcanaDecks) CONTENT.arcanaDecks=[{id:'deck_major',label:'Major Arcana',cards:CONTENT.sovereignties||[]}];
  const ptMap={sovereignties:'arcana','the-star':'steps',chapters:'chapters',calendar:'calendar'};
  const nlMap={world:'Overview',magic:'Magic System',fairies:'Fairies & Towers',artifacts:'Living Artifacts',sovereignties:'Arcana','the-star':'The Star Steps',chapters:'Chapters',calendar:'Calendar & Currency'};
  Object.entries(CONTENT.pages||{}).forEach(([pid,pg])=>{
    if(!pg.pageType&&ptMap[pid]) pg.pageType=ptMap[pid];
    if(!pg.navLabel&&nlMap[pid]) pg.navLabel=nlMap[pid];
    if(pg.sections) pg.sections.forEach(s=>{ if(!s.cols) s.cols=3; });
  });
  if(!CONTENT.pages['the-star']) CONTENT.pages['the-star']={title:'The Star',subtitle:'Sovereignty of Hope · XVII',navLabel:'The Star Steps',pageType:'steps'};
  // Move legacy starSteps into the-star page
  if(CONTENT.starSteps&&CONTENT.pages['the-star']&&!CONTENT.pages['the-star'].steps){
    CONTENT.pages['the-star'].steps=CONTENT.starSteps;
  }
  // Fill empty steps pages, and clear any non-Star page that got The Star's names by mistake
  Object.entries(CONTENT.pages||{}).forEach(([pid,pg])=>{
    if(pg.pageType==='steps'&&pid!=='the-star'){
      if(!pg.steps||!pg.steps.length||hasStarNames(pg.steps)) pg.steps=blankSteps();
    }
    if(pg.pageType==='steps'&&pid==='the-star'&&(!pg.steps||!pg.steps.length)) pg.steps=blankSteps();
  });
  // Ensure every detail card has its own steps page
  (CONTENT.arcanaDecks||[]).forEach(deck=>{
    (deck.cards||[]).forEach(card=>{
      if(card.detail&&!card.stepsPageId){
        const sid=uid();
        card.stepsPageId=sid;
        CONTENT.pages[sid]={title:card.card,subtitle:card.name+(card.num?' · '+card.num:''),navLabel:card.card+' Steps',pageType:'steps',steps:blankSteps()};
      }
    });
  });
}

const STEP_COLORS=['#94a3b8','#86efac','#67e8f9','#a78bfa','#fbbf24','#f97316','#ef4444','#ec4899','#8b5cf6','#3b82f6','#e2e8f0'];
// These are The Star's unique names — any non-Star page that has them got them by mistake
const STAR_NAMES=new Set(['Candlebearer','Omen-Reader','Stargazer','Fate-Charter','Lodestar','Scribe of Skies','Astrologer of Ruin','Living Constellation','Terror of the Void','Sovereign of Hope','The Star']);
function blankSteps(){
  return Array.from({length:11},(_,i)=>({step:i,title:'',color:STEP_COLORS[i],ability:'',downside:''}));
}
function hasStarNames(steps){return steps&&steps.some&&steps.some(s=>STAR_NAMES.has(s.title));}

// ── APP STATE ─────────────────────────────────────────
let editMode=false, saveTimer=null, currentPage='';
const REPO='daisyy-rgb/TillysWorld', FILE='index.html';
function g(id){return document.getElementById(id);}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return 'id'+Date.now()+Math.random().toString(36).slice(2,6);}

// ── GITHUB SAVE ───────────────────────────────────────
function getToken(){return localStorage.getItem('tw_pat')||'';}
function saveToken(){const v=g('pat-input').value.trim();if(v){localStorage.setItem('tw_pat',v);setStatus('Token saved.','saved');g('settings-panel').style.display='none';}}
function toggleSettings(){const p=g('settings-panel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block'){const t=getToken();if(t)g('pat-input').value=t;}}
function setStatus(msg,type){const el=g('save-status');el.textContent=msg;el.className='sb-status '+(type||'');}
function scheduleSave(){setStatus('● Unsaved changes','unsaved');clearTimeout(saveTimer);saveTimer=setTimeout(pushToGitHub,8000);}
async function pushToGitHub(){
  const token=getToken();
  if(!token){setStatus('⚠ No token — set one in GitHub settings','error');return;}
  setStatus('⟳ Saving to GitHub…','saving');
  try{
    const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{headers:{Authorization:'token '+token,'User-Agent':'TillysWorld-Wiki'}});
    if(!r.ok) throw new Error('Fetch failed: '+r.status);
    const fd=await r.json();
    const raw=decodeURIComponent(escape(atob(fd.content.replace(/\n/g,''))));
    const newBlock='/* %%CONTENT_START%% */\nlet CONTENT = '+JSON.stringify(CONTENT)+';\n/* %%CONTENT_END%% */';
    const newHtml=raw.replace(/\/\* %%CONTENT_START%% \*\/[\s\S]*?\/\* %%CONTENT_END%% \*\//,newBlock);
    const encoded=btoa(unescape(encodeURIComponent(newHtml)));
    const pr=await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{method:'PUT',headers:{Authorization:'token '+token,'Content-Type':'application/json','User-Agent':'TillysWorld-Wiki'},body:JSON.stringify({message:'Wiki auto-save',content:encoded,sha:fd.sha})});
    if(!pr.ok){const e=await pr.json();throw new Error(e.message||pr.status);}
    setStatus('✓ Saved to GitHub','saved');
  }catch(e){setStatus('✕ '+e.message,'error');}
}

// ── EDIT MODE ─────────────────────────────────────────
function setEditMode(on){
  editMode=on;
  g('edit-toggle-label').textContent=on?'Edit mode ON — changes save to GitHub automatically':'Edit mode off — content is read-only';
  buildNav();
  rerenderCurrentPage();
}
function rerenderCurrentPage(){if(!currentPage||currentPage.startsWith('char-'))return;renderPage(currentPage);}

// ── NAV ───────────────────────────────────────────────
function buildNav(){
  let html='';
  CONTENT.navSections.forEach((ns,nsi)=>{
    html+=`<div class="ng">`;
    if(editMode){
      html+=`<div style="padding:.45rem 1.2rem .1rem;"><input class="ns-label-inp" value="${esc(ns.label)}" oninput="CONTENT.navSections[${nsi}].label=this.value;buildNav();scheduleSave();"></div>
      <div class="ns-ctrl-row">
        <button class="ns-ctrl-btn" onclick="moveNS(${nsi},-1)">↑</button>
        <button class="ns-ctrl-btn" onclick="moveNS(${nsi},1)">↓</button>
        <button class="ns-ctrl-btn danger" onclick="delNS(${nsi})">✕ tab</button>
      </div>`;
    } else {
      html+=`<div class="ngl">${esc(ns.label)}</div>`;
    }
    if(ns.type==='characters'){
      html+=buildCharGroupNavHtml();
    } else {
      (ns.pages||[]).forEach(pid=>{
        const pg=CONTENT.pages[pid];
        const label=pg?(pg.navLabel||pg.title||pid):pid;
        html+=`<div class="ni${currentPage===pid?' active':''}" onclick="go('${pid}')"><span class="nd"></span>${esc(label)}</div>`;
      });
      if(editMode){
        html+=`<div class="nadd" onclick="addPage(${nsi})">＋ Add page</div>`;
      }
    }
    html+=`</div>`;
  });
  if(editMode){
    html+=`<div class="ns-add-row">
      <div class="nadd" style="border:1px dashed rgba(123,111,187,.3);border-radius:5px;padding:.25rem .6rem;" onclick="addNS('lore')">＋ Lore tab</div>
      <div class="nadd" style="border:1px dashed rgba(123,111,187,.3);border-radius:5px;padding:.25rem .6rem;" onclick="addNS('characters')">＋ Chars tab</div>
    </div>`;
  }
  g('dyn-nav').innerHTML=html;
}

function buildCharGroupNavHtml(){
  let html='';
  CONTENT.charGroups.forEach((grp,gi)=>{
    if(editMode){
      html+=`<div style="padding:.35rem 1.2rem .05rem;display:flex;align-items:center;gap:4px;">
        <input class="grp-label-inp" value="${esc(grp.label)}" oninput="CONTENT.charGroups[${gi}].label=this.value;buildNav();scheduleSave();">
        <button class="ns-ctrl-btn danger" style="flex-shrink:0;" onclick="delCharGroup(${gi})">✕</button>
      </div>`;
    } else {
      html+=`<div class="ngl-sub">${esc(grp.label)}</div>`;
    }
    grp.chars.forEach(cid=>{
      const c=CONTENT.chars[cid];if(!c)return;
      html+=`<div class="ni${currentPage==='char-'+cid?' active':''}" onclick="go('char-${cid}')"><span class="nd"></span>${esc(c.nameEn)}</div>`;
    });
    html+=`<div class="nadd" onclick="addChar('${grp.id}')">＋ New character</div>`;
  });
  if(editMode) html+=`<div class="nadd" onclick="addCharGroup()">＋ Add group</div>`;
  return html;
}

// ── NAV SECTION MANAGEMENT ────────────────────────────
function addNS(type){CONTENT.navSections.push({id:uid(),label:type==='characters'?'New Characters Tab':'New Tab',type,pages:type==='lore'?[]:undefined});buildNav();scheduleSave();}
function delNS(nsi){if(!confirm('Remove this tab? Pages inside are not deleted.'))return;CONTENT.navSections.splice(nsi,1);buildNav();scheduleSave();}
function moveNS(nsi,dir){const ni=nsi+dir;if(ni<0||ni>=CONTENT.navSections.length)return;[CONTENT.navSections[nsi],CONTENT.navSections[ni]]=[CONTENT.navSections[ni],CONTENT.navSections[nsi]];buildNav();scheduleSave();}

// ── PAGE MANAGEMENT ───────────────────────────────────
function addPage(nsi){
  const pid=uid();
  CONTENT.pages[pid]={title:'New Page',subtitle:'',navLabel:'New Page',pageType:'lore',sections:[]};
  CONTENT.navSections[nsi].pages.push(pid);
  ensurePageDOM(pid);
  buildNav();
  go(pid);
  scheduleSave();
}
function delPage(pid,nsi){
  if(!confirm('Delete this page? Cannot be undone.'))return;
  delete CONTENT.pages[pid];
  if(nsi!==undefined) CONTENT.navSections[nsi].pages=CONTENT.navSections[nsi].pages.filter(p=>p!==pid);
  else CONTENT.navSections.forEach(ns=>{if(ns.pages)ns.pages=ns.pages.filter(p=>p!==pid);});
  const el=g('page-'+pid);if(el)el.remove();
  buildNav();scheduleSave();
  go(CONTENT.charOrder[0]?'char-'+CONTENT.charOrder[0]:'world');
}
function ensurePageDOM(pid){
  if(g('page-'+pid))return;
  const sec=document.createElement('section');
  sec.className='page';sec.id='page-'+pid;
  sec.innerHTML=`<div id="render-${pid}"></div>`;
  g('all-pages').appendChild(sec);
}
function initPages(){
  CONTENT.navSections.forEach(ns=>{
    if(ns.type==='lore')(ns.pages||[]).forEach(pid=>ensurePageDOM(pid));

// ── INLINE LINKS + FORMATTING ────────────────────────
function applyFormatting(s){
  return s
    .replace(/\*\*([\s\S]+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([\s\S]+?)\*/g,'<em>$1</em>');
}
function normalizeFormatMarkers(body){
  if(!body)return body;
  const bolds=[];
  body=body.replace(/\*\*([\s\S]+?)\*\*/g,(_,c)=>{bolds.push(c);return'\x01'+(bolds.length-1)+'\x01';});
  body=body.replace(/\*([\s\S]+?)\*/g,(m,c)=>c.includes('\n\n')?c.split('\n\n').map(p=>`*${p}*`).join('\n\n'):m);
  body=body.replace(/\x01(\d+)\x01/g,(_,i)=>{const c=bolds[+i];return c.includes('\n\n')?c.split('\n\n').map(p=>`**${p}**`).join('\n\n'):`**${c}**`;});
  return body;
}
function renderBodyWithLinks(body){
  const parts=(body||'').split(/(\[\[[^\]]+\]\])/g);
  return parts.map(part=>{
    const m=part.match(/^\[\[([^\]|]+)(?:\|([^\]]+))?\]\]$/);
    if(m){
      const pageId=m[1].trim();
      const pg=CONTENT.pages[pageId];
      const label=m[2]||(pg?(pg.navLabel||pg.title):pageId);
      return `<span class="inline-link" onclick="go('${esc(pageId)}')">${esc(label)}</span>`;
    }
    return applyFormatting(esc(part));
  }).join('');
}
function wrapSelected(taId,before,after){
  const ta=document.getElementById(taId);
  if(!ta)return;
  const s=ta.selectionStart,e=ta.selectionEnd;
  const selected=ta.value.substring(s,e);
  ta.value=ta.value.substring(0,s)+before+selected+after+ta.value.substring(e);
  ta.dispatchEvent(new Event('input'));
  ta.setSelectionRange(s+before.length,e+before.length);
  ta.focus();
}

    if(!editMode){
