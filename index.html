<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilly's World</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#201d16;display:flex;min-height:100vh;font-family:sans-serif;}

/* ── SIDEBAR ──────────────────────────────────── */
.sidebar{width:214px;min-width:214px;background:#19160f;padding:1.4rem 0 1rem;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;border-right:1px solid rgba(255,255,255,.04);}
.sb-logo{padding:0 1.2rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:1.1rem;}
.sb-logo .ey{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,173,158,.4);margin-bottom:4px;}
.sb-logo .ti{font-family:'Cinzel',serif;font-size:15px;color:#e8e2d8;letter-spacing:.1em;}
.ng{margin-bottom:.3rem;}
.ngl{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(184,173,158,.35);padding:.55rem 1.2rem .2rem;}
.ni{display:flex;align-items:center;gap:8px;padding:.36rem 1.2rem;font-size:12px;color:#b8ad9e;cursor:pointer;border-left:2px solid transparent;user-select:none;transition:all .12s;}
.ni:hover{color:#fff;background:rgba(255,255,255,.04);}
.ni.active{color:#fff;border-left-color:#7b6fbb;background:rgba(123,111,187,.1);}
.nd{width:4px;height:4px;border-radius:50%;background:rgba(184,173,158,.3);flex-shrink:0;}
.ni.active .nd{background:#7b6fbb;}
.nadd{display:flex;align-items:center;gap:8px;padding:.36rem 1.2rem;font-size:11px;color:rgba(123,111,187,.75);cursor:pointer;transition:all .12s;}
.nadd:hover{color:#b0a8e8;}
.sb-bottom{margin-top:auto;padding:1rem 1.2rem 0;border-top:1px solid rgba(255,255,255,.06);}
.sb-status{font-size:10px;color:#888;margin-bottom:.5rem;min-height:14px;}
.sb-status.unsaved{color:#e0a020;}
.sb-status.saving{color:#7b6fbb;}
.sb-status.saved{color:#4a9960;}
.sb-status.error{color:#c04040;}
.sb-settings-btn{font-size:11px;color:rgba(184,173,158,.5);cursor:pointer;padding:4px 0;}
.sb-settings-btn:hover{color:#b8ad9e;}
.settings-panel{display:none;margin-top:.6rem;padding:.8rem;background:rgba(255,255,255,.05);border-radius:8px;}
.settings-panel label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#888;display:block;margin-bottom:4px;}
.settings-panel input{width:100%;font-size:11px;font-family:monospace;padding:5px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.12);background:#111;color:#ccc;margin-bottom:8px;}
.settings-panel button{font-size:11px;padding:5px 12px;border-radius:5px;border:none;background:#3C3489;color:#fff;cursor:pointer;}

/* ── EDIT MODE TOGGLE ─────────────────────────── */
.edit-toggle-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding:.7rem 1rem;background:rgba(255,255,255,.04);border-radius:8px;}
.edit-toggle-bar span{font-size:12px;color:#b8ad9e;}
.toggle-switch{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:#444;border-radius:10px;transition:background .2s;}
.toggle-thumb{position:absolute;width:14px;height:14px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;}
.toggle-switch input:checked~.toggle-track{background:#7b6fbb;}
.toggle-switch input:checked~.toggle-thumb{left:19px;}

/* ── MAIN ─────────────────────────────────────── */
.main{margin-left:214px;flex:1;padding:2rem 2.4rem 3rem;max-width:980px;}
.page{display:none;}
.page.active{display:block;}
.ph{margin-bottom:1.8rem;padding-bottom:1.1rem;border-bottom:1px solid rgba(255,255,255,.07);}
.ph h1{font-family:'Cinzel',serif;font-size:26px;font-weight:400;color:#e8e2d8;letter-spacing:.07em;}
.ph p{font-size:13px;color:rgba(184,173,158,.7);margin-top:4px;font-style:italic;}
.ph-edit-fields{display:flex;flex-direction:column;gap:6px;margin-top:.5rem;}
.ph-edit-fields input{font-size:13px;font-family:sans-serif;padding:5px 9px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:#2e2a20;color:#e8e2d8;}

/* ── LORE CARDS ───────────────────────────────── */
.lb{margin-bottom:2rem;}
.lbt{font-family:'Cinzel',serif;font-size:15px;color:#c8c0b0;letter-spacing:.1em;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid rgba(255,255,255,.07);}
.card{background:#ddd8d0;border-radius:10px;padding:1.4rem 1.6rem;margin-bottom:1rem;}
.card h2{font-family:'Cinzel',serif;font-size:16px;font-weight:500;color:#2e2820;margin-bottom:.65rem;}
.card h3{font-family:'Cinzel',serif;font-size:13px;color:#5a4e42;margin:1rem 0 .35rem;}
.card p{font-size:14px;line-height:1.75;color:#5a4e42;}
.card p+p{margin-top:.7rem;}
.card ul{list-style:none;padding:0;margin-top:.3rem;}
.card ul li{font-size:14px;color:#5a4e42;padding:3px 0 3px 16px;position:relative;line-height:1.6;}
.card ul li::before{content:'·';position:absolute;left:4px;color:#7b6fbb;}

/* ── EDIT CARD ────────────────────────────────── */
.edit-card{background:#ede8df;border-radius:10px;padding:1.2rem 1.4rem;margin-bottom:1rem;border:2px solid rgba(123,111,187,.3);}
.edit-card-head{display:flex;align-items:center;gap:8px;margin-bottom:.8rem;}
.sect-type-badge{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#888;background:rgba(0,0,0,.08);padding:2px 7px;border-radius:4px;}
.ec-btn{font-size:11px;padding:3px 9px;border-radius:5px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#555;}
.ec-btn:hover{background:#f0f0f0;}
.ec-btn.danger{border-color:#F09595;background:#FCEBEB;color:#A32D2D;}
.ec-btn.danger:hover{background:#F7C1C1;}
.sect-title-inp{font-family:'Cinzel',serif;font-size:15px;width:100%;padding:5px 8px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;margin-bottom:.7rem;}
.sect-body-ta{width:100%;font-size:13px;font-family:'IM Fell English',serif;line-height:1.7;color:#2e2820;padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;min-height:90px;resize:vertical;}
.items-edit-wrap{display:flex;flex-direction:column;gap:6px;}
.item-edit-row{display:flex;gap:6px;align-items:flex-start;}
.item-edit-row input,.item-edit-row textarea{font-size:12px;font-family:sans-serif;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;}
.item-edit-row input{flex:1;}
.item-edit-row textarea{flex:1;min-height:52px;resize:vertical;}
.card-item-edit{background:#fff;border-radius:8px;padding:8px 10px;border:1px solid #ddd;display:flex;flex-direction:column;gap:6px;flex:1;}
.small-add-btn{font-size:11px;color:#3C3489;background:none;border:1px dashed #AFA9EC;border-radius:6px;padding:5px 12px;cursor:pointer;margin-top:4px;width:100%;}
.page-add-btn{font-family:sans-serif;font-size:12px;color:#3C3489;background:none;border:1px dashed #AFA9EC;border-radius:8px;padding:7px 16px;cursor:pointer;margin-top:.5rem;}

/* ── GRIDS ────────────────────────────────────── */
.fairy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.75rem;}
.fairy-card{background:#ddd8d0;border-radius:8px;padding:1.1rem 1.2rem;}
.fairy-card h3{font-family:'Cinzel',serif;font-size:14px;color:#2e2820;margin-bottom:6px;}
.fairy-card p{font-size:13px;line-height:1.65;color:#5a4e42;}
.sigil-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem;}
.sigil-card{background:#ddd8d0;border-radius:8px;padding:.75rem 1rem;text-align:center;font-family:'Cinzel',serif;font-size:13px;color:#2e2820;}
.sov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.75rem;}
.sov-card{background:#ddd8d0;border-radius:8px;padding:1rem 1.1rem;border:2px solid transparent;transition:all .14s;}
.sov-card.hd{cursor:pointer;}
.sov-card.hd:hover{transform:translateY(-2px);border-color:rgba(60,52,137,.35);box-shadow:0 4px 14px rgba(0,0,0,.22);}
.sov-card.ft{border-color:rgba(60,52,137,.4);background:#eae6f5;}
.sov-num{font-size:9px;color:#bbb;letter-spacing:.16em;text-transform:uppercase;margin-bottom:3px;}
.sov-cn{font-family:'Cinzel',serif;font-size:13px;color:#2e2820;margin-bottom:2px;}
.sov-cs{font-size:11.5px;color:#8a7e72;font-style:italic;}
.sov-lk{margin-top:6px;font-size:9px;color:#3C3489;letter-spacing:.12em;text-transform:uppercase;}
.sov-edit-card{background:#ede8df;border-radius:8px;padding:.9rem 1rem;border:2px solid rgba(123,111,187,.25);display:flex;flex-direction:column;gap:6px;}
.sov-edit-card input{font-size:12px;font-family:sans-serif;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;}
.sov-edit-card label{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:#999;}
.sov-edit-controls{display:flex;gap:5px;justify-content:flex-end;}

/* ── STAR STEPS ───────────────────────────────── */
.step-list{display:flex;flex-direction:column;gap:.9rem;}
.step-card{background:#ddd8d0;border-radius:9px;padding:1.2rem 1.4rem;border-left:3px solid;}
.step-ch{display:flex;align-items:baseline;gap:10px;margin-bottom:.75rem;}
.step-nl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#bbb;}
.step-tt{font-family:'Cinzel',serif;font-size:15px;color:#2e2820;}
.abl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#3C3489;margin-bottom:3px;}
.dsl{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#b83232;margin-top:9px;margin-bottom:3px;}
.stxt{font-size:13.5px;line-height:1.72;color:#5a4e42;}
.step-edit-card{background:#ede8df;border-radius:9px;padding:1.1rem 1.3rem;border-left:3px solid #7b6fbb;}
.step-edit-card input{font-size:12px;font-family:'Cinzel',serif;padding:5px 8px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;margin-bottom:6px;}
.step-edit-card .color-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.step-edit-card .color-row label{font-size:10px;color:#999;white-space:nowrap;}
.step-edit-card textarea{width:100%;font-size:12px;font-family:sans-serif;line-height:1.6;padding:6px 8px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;resize:vertical;min-height:72px;margin-bottom:4px;}
.step-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#3C3489;margin-bottom:3px;}
.step-lbl-d{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:#b83232;margin-bottom:3px;margin-top:8px;}

/* ── CHAPTERS ─────────────────────────────────── */
.chap-card{background:#ddd8d0;border-radius:10px;padding:1.6rem 1.9rem;margin-bottom:1.2rem;}
.chap-ey{font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:#aaa;margin-bottom:5px;}
.chap-ti{font-family:'Cinzel',serif;font-size:22px;font-weight:400;color:#2e2820;margin-bottom:1rem;}
.chap-bd{font-size:14px;line-height:1.82;color:#5a4e42;}
.chap-bd p{margin-bottom:.75rem;}
.chap-edit-card{background:#ede8df;border-radius:10px;padding:1.3rem 1.5rem;margin-bottom:1.2rem;border:2px solid rgba(123,111,187,.3);}
.chap-edit-card input{font-size:13px;font-family:'Cinzel',serif;padding:5px 8px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;margin-bottom:8px;}
.chap-edit-card textarea{width:100%;font-size:13px;font-family:'IM Fell English',serif;line-height:1.75;padding:8px 10px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;min-height:200px;resize:vertical;}

/* ── MISC ─────────────────────────────────────── */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:rgba(184,173,158,.7);cursor:pointer;padding:5px 10px;border-radius:6px;margin-bottom:1.5rem;transition:all .13s;}
.back-btn:hover{color:#fff;background:rgba(255,255,255,.06);}
.ctable{width:100%;border-collapse:collapse;}
.ctable th{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:#aaa;text-align:left;padding:6px 12px;border-bottom:1px solid rgba(0,0,0,.1);}
.ctable td{padding:8px 12px;font-size:14px;color:#5a4e42;border-bottom:1px solid rgba(0,0,0,.06);}
.ctable tr:last-child td{border-bottom:none;}
.cal-edit-wrap input,.cal-edit-wrap textarea{font-size:13px;font-family:sans-serif;padding:5px 9px;border-radius:6px;border:1px solid #ccc;background:#faf9f5;color:#2e2820;width:100%;margin-bottom:6px;}
.season-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.season-edit-row input{flex:1;font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;}
.cur-edit-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.cur-edit-row input{flex:1;font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;}

/* ── CHARACTER SHEET ──────────────────────────── */
.sheet-wrap{max-width:900px;}
.sheet-toolbar{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap;}
.mode-btn{font-size:12px;padding:6px 16px;border-radius:8px;border:1px solid #ccc;cursor:pointer;background:#fff;color:#555;}
.mode-btn.active{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC;}
.tbtn{font-size:12px;padding:6px 16px;border-radius:8px;cursor:pointer;}
.tbtn-img{border:1px solid #AFA9EC;background:#3C3489;color:#fff;}
.tbtn-img:hover{background:#534AB7;}
.tbtn-del{border:1px solid #F09595;background:#FCEBEB;color:#A32D2D;}
.tbtn-del:hover{background:#F7C1C1;}
.sheet{background:#ddd8d0;border:1px solid #e0e0e0;border-radius:12px;padding:1.2rem 1.5rem;font-family:'IM Fell English',serif;position:relative;}
.sheet.vm .editable{display:none;}
.sheet.vm .display{display:block;}
.sheet.em .editable{display:block;}
.sheet.em .display{display:none;}
.top-label{font-size:11px;letter-spacing:.15em;color:#999;text-transform:uppercase;font-family:sans-serif;margin-bottom:4px;}
.char-number{font-family:'Cinzel',serif;font-size:48px;font-weight:400;color:#000;line-height:1;opacity:.18;position:absolute;top:2rem;right:2rem;}
.njp{font-size:13px;color:#aaa;font-family:sans-serif;margin-bottom:2px;}
.nen{font-family:'Cinzel',serif;font-size:32px;font-weight:400;color:#222;margin:0 0 4px;letter-spacing:.05em;}
.ntitle{font-size:15px;color:#666;font-style:italic;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #eee;}
.two-col{display:grid;grid-template-columns:1fr 200px;gap:1.2rem;margin-bottom:.8rem;}
.art-frame{border:4px solid #111;border-radius:6px;box-shadow:inset 0 0 0 2px #555,inset 0 0 0 5px #111;overflow:hidden;height:280px;position:relative;background:#111;}
.art-ph{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;height:100%;color:#888;font-size:12px;font-family:sans-serif;text-align:center;padding:1rem;}
.art-img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.info-row{display:flex;gap:8px;margin-bottom:6px;font-size:14px;align-items:baseline;}
.info-label{color:#aaa;font-family:sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;min-width:90px;padding-top:2px;flex-shrink:0;}
.info-value{color:#222;font-size:14px;line-height:1.4;}
input[type=text],textarea{width:100%;font-size:13px;font-family:sans-serif;padding:4px 8px;border-radius:6px;border:1px solid #ddd;background:#f9f9f9;color:#222;}
textarea{resize:vertical;min-height:48px;}
.frow{display:flex;gap:8px;margin-bottom:6px;align-items:center;}
.flabel{color:#aaa;font-family:sans-serif;font-size:11px;letter-spacing:.1em;text-transform:uppercase;min-width:90px;flex-shrink:0;}
hr.div{border:none;border-top:1px solid #eee;margin:.6rem 0;}
.slabel{font-family:sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#bbb;margin-bottom:6px;}
.stat-name{font-family:sans-serif;font-size:12px;color:#666;min-width:130px;}
.stat-row-v{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.stat-bg{flex:1;height:6px;background:#f0f0f0;border-radius:3px;overflow:hidden;}
.stat-fill{height:100%;border-radius:3px;background:#3C3489;transition:width .2s;}
.stat-val{font-family:sans-serif;font-size:11px;color:#777;min-width:36px;text-align:right;white-space:nowrap;flex-shrink:0;}
.stat-row-e{display:flex;align-items:center;gap:8px;margin-bottom:6px;padding:6px 8px;background:#f9f9f9;border-radius:8px;border:1px solid #eee;}
.stat-row-e input[type=text]{width:120px;flex-shrink:0;}
.stat-row-e input[type=range]{flex:1;min-width:60px;}
.rmbtn{flex-shrink:0;width:28px;height:28px;border-radius:6px;border:1px solid #F09595;background:#FCEBEB;color:#A32D2D;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:sans-serif;line-height:1;}
.rmbtn:hover{background:#F7C1C1;}
.add-btn{font-family:sans-serif;font-size:12px;color:#3C3489;background:none;border:1px dashed #AFA9EC;border-radius:8px;padding:6px 14px;cursor:pointer;margin-top:4px;width:100%;}
.karma-track{width:100%;height:10px;border-radius:5px;overflow:hidden;display:flex;margin:8px 0 4px;}
.karma-evil{height:100%;background:#A32D2D;transition:width .15s;}
.karma-good{height:100%;background:#185FA5;transition:width .15s;}
.karma-labels{display:flex;justify-content:space-between;font-size:10px;font-family:sans-serif;}
.karma-label-evil{color:#A32D2D;}
.karma-label-good{color:#185FA5;}
.karma-value{font-family:'Cinzel',serif;font-size:18px;font-weight:400;}
.kbadge{display:inline-block;background:#EEEDFE;color:#3C3489;font-family:sans-serif;font-size:11px;padding:3px 10px;border-radius:6px;margin-left:8px;vertical-align:middle;}
.item-tag{display:inline-flex;align-items:center;gap:6px;border:1px solid #ddd;border-radius:6px;font-size:12px;font-family:sans-serif;color:#666;padding:3px 10px;margin:3px 3px 3px 0;}
.item-row-e{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px;background:#fff;border-radius:6px;border:1px solid #eee;}
.item-row-e input[type=text]{flex:1;}
.trait-block{font-size:16px;color:#666;font-style:italic;line-height:1.6;border-left:2px solid #AFA9EC;padding-left:12px;}
.url-hint{font-size:11px;color:#aaa;font-family:sans-serif;margin-top:4px;}
.empty-note{font-size:12px;font-family:sans-serif;color:#aaa;font-style:italic;}
.footer-row{font-family:sans-serif;font-size:11px;color:#999;display:flex;justify-content:space-between;gap:8px;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px;}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sb-logo">
    <div class="ey">World Wiki</div>
    <div class="ti">Tilly's World</div>
  </div>
  <div class="ng">
    <div class="ngl">Characters</div>
    <div id="char-nav"></div>
    <div class="nadd" onclick="addChar()">＋ New character</div>
  </div>
  <div class="ng">
    <div class="ngl">The World</div>
    <div class="ni" onclick="go('world')"><span class="nd"></span>Overview</div>
    <div class="ni" onclick="go('magic')"><span class="nd"></span>Magic System</div>
    <div class="ni" onclick="go('fairies')"><span class="nd"></span>Fairies &amp; Towers</div>
    <div class="ni" onclick="go('artifacts')"><span class="nd"></span>Living Artifacts</div>
    <div class="ni" onclick="go('sovereignties')"><span class="nd"></span>Sovereignties</div>
  </div>
  <div class="ng">
    <div class="ngl">Story</div>
    <div class="ni" onclick="go('chapters')"><span class="nd"></span>Chapters</div>
  </div>
  <div class="ng">
    <div class="ngl">Reference</div>
    <div class="ni" onclick="go('calendar')"><span class="nd"></span>Calendar &amp; Currency</div>
  </div>
  <div class="sb-bottom">
    <div class="sb-status" id="save-status">—</div>
    <div class="sb-settings-btn" onclick="toggleSettings()">⚙ GitHub settings</div>
    <div class="settings-panel" id="settings-panel">
      <label>Personal Access Token</label>
      <input type="password" id="pat-input" placeholder="github_pat_..." autocomplete="off">
      <button onclick="saveToken()">Save token</button>
    </div>

let CONTENT = {"charOrder":["tilly"],"chars":{"tilly":{"id":"tilly","number":"01","nameJp":"ティリー","nameEn":"Tilly","title":"Eustace's beloved child","arcanaLabel":"Arcana","arcanaValue":"","stepLabel":"Step","stepValue":"","imgUrl":"https://i.imgur.com/RqDz8JN.jpeg","appearance":"Short shaggy dark auburn hair\nWarm amber eyes\nWorn vest · linen shirt · old boots","quote":"Tilly is twelve years old and has already learned that the world is not always kind. Raised above a cluttered antique shop in the city of Alderrdeen by her grandfather, she has a gift for knowing exactly what something is worth, and exactly what someone can pay. She is sharper than she looks, and kinder than she has any reason to be. She asks for very little in return for either. She loves deeply and without condition, and it has never once occurred to her that this might someday cost her something.","footer1":"Alderrdeen Township","footer2":"993 A.G. — Springtide","karma":425,"basicInfo":[{"label":"Age","value":"12"},{"label":"Race","value":"Human"},{"label":"Origin","value":"Orphaned from a young age, Tilly was raised in an antique shop by a local man who took her in."},{"label":"Guardian","value":"Eustace (Grandfather)"},{"label":"Residence","value":"Eustace's Oddities"},{"label":"Alignment","value":"Chaotic Good"}],"stats":[{"name":"Kindness","val":88},{"name":"Courage","val":80},{"name":"Wit","val":64},{"name":"Stubbornness","val":91},{"name":"Luck","val":49},{"name":"Renown","val":1}],"customSections":[{"title":"Items","items":[{"name":"4 Sonens","note":"(20 of these make up a single Aurem)"},{"name":"7 Trins","note":"(100 of these make up a single Sonen)"}]}]}},"pages":{"world":{"title":"The World","subtitle":"Spring of the 993rd Free Year (993 A.G.)","sections":[{"id":"w1","title":"History","body":"Long ago, God controlled the vast majority of magic and used it to set predetermined fates for all living things. The King of Humanity, the Fairy Paragon, and the largest Fragment of God rebelled and killed him. This freed magic for everyone — but chaos followed.\n\nThe three rebels reconvened and imposed limits on magic through an agreement known as The Binding. The world is set in a medieval-early renaissance era. The Free Calendar counts from the death of God."},{"id":"w2","title":"The Mother Goddess","body":"The Mother Goddess predates God entirely. Fairies are her children. She allied with the King of Humanity and the Fairy Paragon to defeat God, but spent everything in the process and fell into a deep sleep.\n\nAs part of their agreement she still sends her essence into the world while sleeping — this manifests as Fairy Fountains, which appear randomly. Anything submerged in a Fairy Fountain gains magical properties. They are essentially her dreams bleeding through into the waking world.\n\nMost humans don't know she exists. Even most Fairies have forgotten her. The wealthy hoard Fairy Fountains, draining them for personal use. Finding one before the rich claim it is nearly impossible."},{"id":"w3","title":"Notable Locations","type":"cards","items":[{"name":"Alderrdeen Township","body":"The city where the story begins. Cobblestone streets, candlelight, merchant stalls, nobles who hoard Fairy Fountains. Home to Eustace's Oddities."}]}]},"magic":{"title":"Magic System","subtitle":"Magic directs — it does not create","sections":[{"id":"m1","title":"The Principle","body":"Magic directs — it does not create. You cannot conjure something from nothing. You redirect forces that already exist in the world.\n\nMagic is performed by drawing sigil circles. Each sigil represents a fundamental force. Combinations of sigils create instructions. To make fire from nothing requires combining Air, Motion/Force, Heat, Direction, and Containment sigils — five sigils combined correctly just to produce something resembling a fireball.\n\nRegular magic takes years of practice to master. Big spells can take weeks to prepare. Magic is used mostly for small daily tasks."},{"id":"m2","title":"Fundamental Forces (Sigils)","type":"tags","items":["Air","Water","Earth","Heat","Motion / Force","Structural","Botanical","Sensory","Vital"]},{"id":"m3","title":"Schools of Magic","type":"list","items":["Elemental Direction — air, water, earth, fire","Kinetics — force, motion, speed","Structural — reinforcement, reduction, expansion","Botanical — growth and decay","Sensory — light, sound, temperature","Vital — the body's own energy, heavily restricted"]},{"id":"m4","title":"The Binding & Forbidden Magic","body":"After God's death, the three rebels imposed The Binding — limiting magic to sanctioned, caged use. Forbidden magic draws from the raw power released when God fell. It is faster, stronger, and requires no years of practice.\n\nThe moment someone uses forbidden magic, every Fairy in the vicinity feels it. They come. They punish — killing some, turning others into monsters. No mercy. No context. No exceptions.\n\nForbidden mages have survived by studying Fairy behavior for centuries. They have mapped territories, travel speeds, and patterns. They also hide behind fragments of the Skeleton Key, which drowns out the signal of their magic entirely."},{"id":"m5","title":"Arcanists","body":"Magic users who have chosen a Sovereignty — a discipline that shapes both their abilities and their soul over time — are called Arcanists. Each Sovereignty has 10 Steps plus a Step 0, numbered from Step 0 to Step X (nearly unreachable pinnacle). Sanctioned practitioners change slowly. Forbidden magic practitioners change much faster and far more dangerously."}]},"fairies":{"title":"Fairies & Towers","subtitle":"Children of the Mother Goddess","sections":[{"id":"f1","title":"About Fairies","body":"Fairies are the Mother Goddess's children — biologically identical regardless of type, but culturally divided. They can only use large amounts of magic when channeling it through a human.\n\nFairies are deeply racist toward one another despite being biologically the same. Many have forgotten the Mother Goddess. Fairies manifest in different forms when enforcing The Binding — some as storms, some as humans, others as shapeless monsters."},{"id":"f2","title":"Types of Fairies","type":"cards","items":[{"name":"Djinn","body":"Reside in Fairy Towers. Anyone who clears a tower to the top claims the Djinn's treasure and a piece of their power, usually as a Living Artifact."},{"name":"Daemons","body":"Offer power through deals, taking body parts, memories, emotions, firstborn children, or other personal costs in exchange."},{"name":"Angels","body":"Give power only to their most devout followers."},{"name":"Others (In Development)","body":"Asura, Devas, Nymphs, Spirits, Wraiths, Shades. Each gives magic away differently. Some are malicious."}]},{"id":"f3","title":"Fairy Towers","body":"Enormously difficult to clear. Even kings wouldn't attempt them — the cost in lives would be catastrophic. This makes them the great equalizer: no amount of wealth or power substitutes for the skill and luck required to reach the top alone.\n\nEach tower is different. Each Djinn is different. The Living Artifact rewarded varies by tower."}]},"artifacts":{"title":"Living Artifacts","subtitle":"Objects that contain a Fairy and hold one spell or power","sections":[{"id":"a0","title":"","body":"Living Artifacts contain a Fairy and hold one spell or power within them. Clearing a Fairy Tower earns one. They are extraordinarily rare and valuable."},{"id":"a1","title":"Eustace's Sword","body":"Contained a fire Djinn. Every swing released flame. Eustace earned it in his youth clearing a tower. He kept it secret for decades. He spent it protecting Tilly at the end of Chapter I."},{"id":"a2","title":"The Skeleton Key","body":"The finger of the King of Humanity, who threw himself into a Fairy Fountain and made every part of his body holy. Allows travel through unseen doorways — any door leads to any other door, unpredictably. The longer it is used the more it infects the user's body. Fused to Tilly's right hand."},{"id":"a3","title":"Deeper Significance (Skeleton Key)","body":"Each piece of the King's body resonates loudly with Fairies — not as a threat, but as something sacred. This has an unintended effect: it drowns out the signal of forbidden magic being used nearby. Whoever holds a fragment can use forbidden magic without Fairy detection.\n\nThe Kingdom holds half the fragments (believing them simply powerful relics). Forbidden mages hold the other half (knowing exactly what they do). Tilly holds one piece neither side has acquired. She is now caught between two forces who want her — for different reasons, neither of which they will tell her plainly."}]}},"sovereignties":[{"num":"0","card":"The Fool","name":"Sovereignty of Wandering"},{"num":"I","card":"The Magician","name":"Sovereignty of Direction"},{"num":"II","card":"The High Priestess","name":"Sovereignty of Secrets"},{"num":"III","card":"The Empress","name":"Sovereignty of Growth"},{"num":"IV","card":"The Emperor","name":"Sovereignty of Command"},{"num":"V","card":"The Hierophant","name":"Sovereignty of Tradition"},{"num":"VI","card":"The Lovers","name":"Sovereignty of Bonds"},{"num":"VII","card":"The Chariot","name":"Sovereignty of Motion"},{"num":"VIII","card":"Strength","name":"Sovereignty of Force"},{"num":"IX","card":"The Hermit","name":"Sovereignty of Isolation"},{"num":"X","card":"Wheel of Fortune","name":"Sovereignty of Luck"},{"num":"XI","card":"Justice","name":"Sovereignty of Balance"},{"num":"XII","card":"The Hanged Man","name":"Sovereignty of Sacrifice"},{"num":"XIII","card":"Death","name":"Sovereignty of Endings"},{"num":"XIV","card":"Temperance","name":"Sovereignty of Restraint"},{"num":"XV","card":"The Devil","name":"Sovereignty of Temptation"},{"num":"XVI","card":"The Tower","name":"Sovereignty of Destruction"},{"num":"XVII","card":"The Star","name":"Sovereignty of Hope","detail":true,"featured":true},{"num":"XVIII","card":"The Moon","name":"Sovereignty of Illusion"},{"num":"XIX","card":"The Sun","name":"Sovereignty of Radiance"},{"num":"XX","card":"Judgement","name":"Sovereignty of Awakening"},{"num":"XXI","card":"The World","name":"Sovereignty of Completion"}],"starSteps":[{"step":0,"title":"Candlebearer","color":"#94a3b8","ability":"A faint warm light emanates from the Arcanist that wind and water cannot extinguish. Small radius. Always present. Can be dimmed by will. In complete darkness it's the difference between seeing and not seeing.","downside":"They begin sleeping later than usual. Nothing dramatic yet."},{"step":1,"title":"Omen-Reader","color":"#86efac","ability":"They begin noticing signs others miss. A fighter's weight shifting before they throw a punch. A mage's breath changing before they draw a sigil. They see it coming a half second before it arrives. In a brawl a half second is everything.","downside":"They begin feeling the emotions of people around them without meaning to. Someone nearby is grieving and they feel it like pressure behind their eyes. They can't turn it off yet."},{"step":2,"title":"Stargazer","color":"#67e8f9","ability":"Their light has developed an edge. They can focus it into a narrow beam — not enough to burn yet, but enough to blind someone momentarily. They can also project it as a short burst in all directions, disorienting multiple enemies at once. By studying the night sky for an hour they gain a vague sense of what tomorrow holds for themselves or someone nearby.","downside":"They can no longer lie convincingly. Their light flickers almost imperceptibly when they say something untrue. Animals notice first. Then perceptive people."},{"step":3,"title":"Fate-Charter","color":"#a78bfa","ability":"They begin to read the immediate future in combat with frightening accuracy. Not minutes ahead — seconds. The next blow. The next step. The next breath. They move through a fight like water finding its path, never quite where the attack lands. They aren't faster than their opponents. They simply aren't there when the hit arrives. They can also sense when someone nearby is at a turning point in their life.","downside":"They are inexplicably drawn to people who are suffering. Strangers in pain find them. They cannot walk past someone in genuine despair without stopping. This is not a choice."},{"step":4,"title":"Lodestar","color":"#fbbf24","ability":"They can now project their light as a physical force. A concentrated pulse that hits like a shove — enough to knock someone off their feet or send a weapon spinning out of a hand. It can be fired repeatedly but costs genuine effort. Lost things also find their way to them — a missing person wanders past them on the street, a stolen object turns up nearby.","downside":"They stop being able to sustain hatred. They can be furious. Devastated. But hatred dissolves in them like salt in water."},{"step":5,"title":"Scribe of Skies","color":"#f97316","ability":"Their body has begun to change. Bones subtly denser. Reflexes sharpened beyond normal human limits without any training to explain it. The road is rewriting them from the inside. They hit harder than they should for their size and recover from impacts faster than makes sense. They also always know the broad shape of fate moving around them — who is in danger, where hope is concentrated. Always on. Cannot be turned off.","downside":"They stop needing to eat as much. A meal every few days sustains them. People who know them well begin to notice they never seem hungry."},{"step":6,"title":"Astrologer of Ruin","color":"#ef4444","ability":"They can see the threads of fate connecting people in a fight. Who is about to make a fatal mistake. Where the turning point of the battle is. They only need to pull the right thread at the right moment and watch everything unravel. They can also hear wishes — not spoken ones, the ones people carry silently. With focus they can isolate a single person's deepest want.","downside":"They begin to glow faintly in complete darkness. They cannot control it."},{"step":7,"title":"Living Constellation","color":"#ec4899","ability":"Their light has become something altogether different. They can shape it into walls of blazing radiance that physical weapons cannot pass through. Beams that strike with the force of a battering ram. A corona of burning light around their body that makes close combat deeply unpleasant. Allies near them feel steadier and harder to break. Enemies feel watched from very far away and found wanting.","downside":"Their tears are luminescent. They cannot hide grief. It literally shines out of them."},{"step":8,"title":"Terror of the Void","color":"#8b5cf6","ability":"Once per fight they can stop time for a single breath. In that breath they can move, redirect, reposition, pull someone out of the path of something unsurvivable. When time resumes nobody saw them move. Their body now heals at a rate that is difficult to explain — cuts close within minutes, broken bones within hours. They are becoming very hard to kill.","downside":"They have begun to forget small human things. The taste of their favourite food. The sound of a voice they loved. Small human details blur while cosmic ones sharpen."},{"step":9,"title":"Sovereign of Hope","color":"#3b82f6","ability":"They are no longer entirely fighting with a body. They are fighting with a concept. Their strikes carry weight beyond physical force — a blow doesn't just break bone, it breaks something in the spirit of whoever receives it. Anyone who has truly given up and comes near them feels something shift — the genuine sense that one more try is worth it. No range limit. Cannot be resisted. It has ended sieges. Their light can be seen from miles away if fully released.","downside":"They are no longer aging. They will outlive everyone they love unless something kills them first. They are beginning to understand what that means."},{"step":10,"title":"The Star","color":"#e2e8f0","ability":"There are no reliable accounts of a Star in combat because nothing that has ever fought one has survived to describe it coherently. What fragments exist speak of light that rewrites what it touches. Of wounds that simply cease to exist. Of enemies who stopped fighting not because they were defeated but because in the presence of a Star the concept of fighting seemed very small and very far away. A Star does not win battles. A Star ends them.","downside":"They are still here. Still themselves. But when they look at the people around them there is something in their eyes that wasn't there before. A distance. Not coldness. But they are seeing something the rest of the world cannot see yet. And sometimes when someone speaks to them there is a moment — just a breath — before they remember to respond like a person."}],"chapters":[{"number":"I","title":"The Skeleton Key","body":"Tilly works the counter at Eustace's Oddities. A worn-down adventurer comes in looking at swords. She reads him immediately — no money, genuine need — and sells him one for practically nothing. Then a noble walks in. Same product. She sells it for ten times the price without blinking.\n\nShe visits Eustace, who is bedridden. He coughs. She decides to find a Fairy Fountain to enchant his medicine and heal him. She searches the outskirts of Alderrdeen all day. Beautiful landscapes. No fountain. The wealthy have claimed them all.\n\nReturning home hungry, she steals bread from a market stall. Guards give chase. She rounds a corner into an alley and nearly steps on a dying man. He begs her not to give him away. She throws a tarp over him and acts casual.\n\nTwo guard groups converge — one chasing a bread thief, one hunting someone who escaped with a Living Artifact. The second group waves the first away. Tilly is alone with the dying man.\n\nHe presses something into her hand — a long pale bone-like key. It fuses to her finger before she can react. He tells her to run. It doesn't matter where. Just don't let it fall into the wrong hands. Then he is gone.\n\nTilly returns home. She has only moments with Eustace before guards arrive demanding the artifact. It won't leave her hand. They decide to take the finger. Eustace rises from his bed, unwraps his Living Artifact, and the sword erupts in flame.\n\n\"You will do no such thing.\"\n\nHe holds them off. Tilly is pushed through the back door. Eustace throws his sword through just before it closes. The guards who follow find themselves in the back alleyway. Tilly finds herself somewhere else entirely.\n\nA snowfield. Silent. Cold. No city. No guards. No grandfather. Just Tilly, alone, with a dying flaming sword in the snow and a dead king's finger fused to her hand.\n\nThis is when she becomes a Candlebearer."}],"calendarNote":"The calendar counts from the death of God — A.G. (Anno God's-death). Current date: Spring of the 993rd Free Year (993 A.G. — Springtide).","seasons":["Springtide","Highsun","Dimfall","Deeprest"],"currency":[{"name":"Aurem","material":"Gold","exchange":"Highest denomination"},{"name":"Sonen","material":"Silver","exchange":"20 per Aurem"},{"name":"Trin","material":"Copper","exchange":"100 per Sonen · 2000 per Aurem"}]};

// ── APP STATE ─────────────────────────────────────────
let editMode = false;
let saveTimer = null;
const REPO = 'daisyy-rgb/TillysWorld';
const FILE = 'index.html';

function g(id){ return document.getElementById(id); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── GITHUB SAVE ───────────────────────────────────────
function getToken(){ return localStorage.getItem('tw_pat')||''; }
function saveToken(){
  const v = g('pat-input').value.trim();
  if(v){ localStorage.setItem('tw_pat',v); setStatus('Token saved.','saved'); g('settings-panel').style.display='none'; }
}
function toggleSettings(){
  const p=g('settings-panel');
  p.style.display = p.style.display==='none'?'block':'none';
  if(p.style.display==='block'){ const t=getToken(); if(t) g('pat-input').value=t; }
}

function setStatus(msg,type){
  const el=g('save-status');
  el.textContent=msg;
  el.className='sb-status '+(type||'');
}

function scheduleSave(){
  setStatus('● Unsaved changes','unsaved');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(pushToGitHub, 8000);
}

async function pushToGitHub(){
  const token = getToken();
  if(!token){ setStatus('⚠ No token — set one in GitHub settings','error'); return; }
  setStatus('⟳ Saving to GitHub…','saving');
  try {
    // Fetch current file for SHA + template
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
      headers:{ Authorization:'token '+token, 'User-Agent':'TillysWorld-Wiki' }
    });
    if(!r.ok) throw new Error('Fetch failed: '+r.status);
    const fd = await r.json();
    const sha = fd.sha;
    const raw = decodeURIComponent(escape(atob(fd.content.replace(/\n/g,''))));

    // Replace CONTENT block
    const newBlock = '/* %%CONTENT_START%% */\nlet CONTENT = '+JSON.stringify(CONTENT)+';\n/* %%CONTENT_END%% */';
    const newHtml = raw.replace(/\/\* %%CONTENT_START%% \*\/[\s\S]*?\/\* %%CONTENT_END%% \*\//, newBlock);

    // Push
    const encoded = btoa(unescape(encodeURIComponent(newHtml)));
    const pr = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`,{
      method:'PUT',
      headers:{ Authorization:'token '+token, 'Content-Type':'application/json', 'User-Agent':'TillysWorld-Wiki' },
      body: JSON.stringify({ message:'Wiki auto-save', content:encoded, sha })
    });
    if(!pr.ok){ const e=await pr.json(); throw new Error(e.message||pr.status); }
    setStatus('✓ Saved to GitHub','saved');
  } catch(e){
    setStatus('✕ '+e.message,'error');
  }
}

// ── EDIT MODE ─────────────────────────────────────────
function setEditMode(on){
  editMode = on;
  g('edit-toggle-label').textContent = on
    ? 'Edit mode ON — changes save to GitHub automatically'
    : 'Edit mode off — content is read-only';
  rerenderCurrentPage();
}

let currentPage = '';
function rerenderCurrentPage(){
  if(!currentPage) return;
  if(currentPage.startsWith('char-')) return; // chars have their own mode
  renderPage(currentPage);
}

// ── NAVIGATION ────────────────────────────────────────
function go(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el=g('page-'+pageId);
  if(el) el.classList.add('active');
  document.querySelectorAll('.ni').forEach(n=>{
    const fn=n.getAttribute('onclick')||'';
    n.classList.toggle('active', fn.includes("'"+pageId+"'"));
  });
  currentPage = pageId;
  renderPage(pageId);
  window.scrollTo(0,0);
}

function renderPage(pageId){
  if(['world','magic','fairies','artifacts'].includes(pageId)) renderLorePage(pageId);
  else if(pageId==='sovereignties') renderSovPage();
  else if(pageId==='the-star') renderStarPage();
  else if(pageId==='chapters') renderChaptersPage();
  else if(pageId==='calendar') renderCalendarPage();
}

// ── LORE PAGES ────────────────────────────────────────
function renderLorePage(pid){
  const page = CONTENT.pages[pid];
  let html = '';

  if(editMode){
    html += `<div class="ph">
      <div class="ph-edit-fields">
        <input value="${esc(page.title)}" placeholder="Page title" style="font-family:'Cinzel',serif;font-size:22px;color:#e8e2d8;background:#2e2a20;border-color:rgba(255,255,255,.15);"
          oninput="CONTENT.pages['${pid}'].title=this.value;scheduleSave();">
        <input value="${esc(page.subtitle)}" placeholder="Subtitle"
          oninput="CONTENT.pages['${pid}'].subtitle=this.value;scheduleSave();">
      </div>
    </div>`;
  } else {
    html += `<div class="ph"><h1>${esc(page.title)}</h1><p>${esc(page.subtitle)}</p></div>`;
  }

  page.sections.forEach((sec,idx)=>{
    html += renderSection(pid,idx,sec);
  });

  if(editMode){
    html += `<div style="margin-top:.5rem">
      <button class="page-add-btn" onclick="addSection('${pid}','text')">+ Add text section</button>
      <button class="page-add-btn" style="margin-left:8px;" onclick="addSection('${pid}','list')">+ Add list section</button>
      <button class="page-add-btn" style="margin-left:8px;" onclick="addSection('${pid}','cards')">+ Add cards section</button>
    </div>`;
  }

  g('render-'+pid).innerHTML = html;
}

function renderSection(pid,idx,sec){
  const type = sec.type || 'text';
  if(!editMode){
    // VIEW
    let inner = sec.title ? `<h2>${esc(sec.title)}</h2>` : '';
    if(type==='text'){
      inner += (sec.body||'').split('\n\n').filter(Boolean).map(p=>`<p>${esc(p)}</p>`).join('');
    } else if(type==='list'){
      inner += `<ul>${(sec.items||[]).map(it=>`<li>${esc(it)}</li>`).join('')}</ul>`;
    } else if(type==='tags'){
      return `<div class="lb"><div class="lbt">${esc(sec.title)}</div><div class="sigil-grid">${(sec.items||[]).map(t=>`<div class="sigil-card">${esc(t)}</div>`).join('')}</div></div>`;
    } else if(type==='cards'){
      const cards = (sec.items||[]).map(it=>`<div class="fairy-card"><h3>${esc(it.name)}</h3><p>${esc(it.body)}</p></div>`).join('');
      return `<div class="lb"><div class="lbt">${esc(sec.title)}</div><div class="fairy-grid">${cards}</div></div>`;
    }
    return `<div class="card">${inner}</div>`;
  }

  // EDIT
  let content = '';
  const rr = `rerenderLore('${pid}')`;

  if(type==='text'){
    content = `<textarea class="sect-body-ta" oninput="CONTENT.pages['${pid}'].sections[${idx}].body=this.value;scheduleSave();" rows="6">${esc(sec.body||'')}</textarea>`;
  } else if(type==='list'||type==='tags'){
    const itemsHtml = (sec.items||[]).map((it,ii)=>`
      <div class="item-edit-row">
        <input value="${esc(it)}" oninput="CONTENT.pages['${pid}'].sections[${idx}].items[${ii}]=this.value;scheduleSave();">
        <button class="rmbtn" onclick="CONTENT.pages['${pid}'].sections[${idx}].items.splice(${ii},1);${rr};scheduleSave();">✕</button>
      </div>`).join('');
    content = `<div class="items-edit-wrap">${itemsHtml}</div>
      <button class="small-add-btn" onclick="CONTENT.pages['${pid}'].sections[${idx}].items.push('New item');${rr};scheduleSave();">+ Add item</button>`;
  } else if(type==='cards'){
    const cardsHtml = (sec.items||[]).map((it,ii)=>`
      <div class="item-edit-row">
        <div class="card-item-edit">
          <input value="${esc(it.name)}" placeholder="Name" oninput="CONTENT.pages['${pid}'].sections[${idx}].items[${ii}].name=this.value;scheduleSave();">
          <textarea oninput="CONTENT.pages['${pid}'].sections[${idx}].items[${ii}].body=this.value;scheduleSave();" rows="3">${esc(it.body||'')}</textarea>
        </div>
        <button class="rmbtn" onclick="CONTENT.pages['${pid}'].sections[${idx}].items.splice(${ii},1);${rr};scheduleSave();">✕</button>
      </div>`).join('');
    content = `<div class="items-edit-wrap">${cardsHtml}</div>
      <button class="small-add-btn" onclick="CONTENT.pages['${pid}'].sections[${idx}].items.push({name:'New card',body:''});${rr};scheduleSave();">+ Add card</button>`;
  }

  const typeSelect = `<select style="font-size:11px;padding:3px 6px;border-radius:4px;border:1px solid #ccc;" onchange="CONTENT.pages['${pid}'].sections[${idx}].type=this.value;if(this.value!=='cards')CONTENT.pages['${pid}'].sections[${idx}].items=CONTENT.pages['${pid}'].sections[${idx}].items||[];if(this.value==='text')CONTENT.pages['${pid}'].sections[${idx}].body=CONTENT.pages['${pid}'].sections[${idx}].body||'';${rr};scheduleSave();">
    <option value="text" ${type==='text'?'selected':''}>Text</option>
    <option value="list" ${type==='list'?'selected':''}>List</option>
    <option value="tags" ${type==='tags'?'selected':''}>Tags/Grid</option>
    <option value="cards" ${type==='cards'?'selected':''}>Cards</option>
  </select>`;

  return `<div class="edit-card">
    <div class="edit-card-head">
      <span class="sect-type-badge">${type}</span>
      ${typeSelect}
      <button class="ec-btn" onclick="moveSec('${pid}',${idx},-1)">↑</button>
      <button class="ec-btn" onclick="moveSec('${pid}',${idx},1)">↓</button>
      <button class="ec-btn danger" onclick="CONTENT.pages['${pid}'].sections.splice(${idx},1);${rr};scheduleSave();">Remove</button>
    </div>
    <input class="sect-title-inp" value="${esc(sec.title||'')}" placeholder="Section title (leave blank for no title)"
      oninput="CONTENT.pages['${pid}'].sections[${idx}].title=this.value;scheduleSave();">
    ${content}
  </div>`;
}

function rerenderLore(pid){ renderLorePage(pid); }

function addSection(pid,type){
  const s = {id:'s'+Date.now(),title:'New Section',type};
  if(type==='text') s.body='';
  else if(type==='list'||type==='tags') s.items=[];
  else if(type==='cards') s.items=[];
  CONTENT.pages[pid].sections.push(s);
  renderLorePage(pid);
  scheduleSave();
}

function moveSec(pid,idx,dir){
  const secs=CONTENT.pages[pid].sections;

  if(ni<0||ni>=secs.length) return;

}

  g(id+'__biv').innerHTML=c.basicInfo.map(bi=>`<div class="info-row"><span class="info-label">${bi.label}</span><span class="info-value">${bi.value}</span></div>`).join('');
  g(id+'__bie').innerHTML=c.basicInfo.map((bi,i)=>`<div class="frow">
    <input type="text" value="${esc(bi.label)}" style="width:90px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0;" onchange="CONTENT.chars['${id}'].basicInfo[${i}].label=this.value;sRenderBI('${id}');saveChars();">
    <input type="text" value="${esc(bi.value)}" style="flex:1;" onchange="CONTENT.chars['${id}'].basicInfo[${i}].value=this.value;sRenderBI('${id}');saveChars();">
    <button class="rmbtn" onclick="CONTENT.chars['${id}'].basicInfo.splice(${i},1);sRenderBI('${id}');saveChars();">✕</button>
  </div>`).join('');
}

function sRenderStats(id){
  const c=CONTENT.chars[id];
  g(id+'__stv').innerHTML=c.stats.map(s=>{
    const n=parseFloat(s.val); const p=Math.min(isNaN(n)?0:n,100);
    return `<div class="stat-row-v"><span class="stat-name">${s.name}</span><div class="stat-bg"><div class="stat-fill" style="width:${p}%"></div></div><span class="stat-val">${s.val}</span></div>`;
  }).join('');
  g(id+'__ste').innerHTML=c.stats.map((s,i)=>{
    const nv=isNaN(parseFloat(s.val))?50:Math.min(Math.max(parseFloat(s.val),0),100);
    return `<div class="stat-row-e">
      <input type="text" value="${esc(s.name)}" onchange="CONTENT.chars['${id}'].stats[${i}].name=this.value;sRenderStats('${id}');saveChars();" style="width:110px;flex-shrink:0;">
      <input type="range" min="0" max="100" step="1" value="${nv}" oninput="CONTENT.chars['${id}'].stats[${i}].val=parseInt(this.value);this.nextElementSibling.value=this.value;sRenderStats('${id}');saveChars();" style="flex:1;min-width:60px;">
      <input type="text" value="${esc(String(s.val))}" onchange="CONTENT.chars['${id}'].stats[${i}].val=this.value;sRenderStats('${id}');saveChars();" style="width:52px;flex-shrink:0;text-align:center;">
      <button class="rmbtn" onclick="CONTENT.chars['${id}'].stats.splice(${i},1);sRenderStats('${id}');saveChars();">✕</button>
    </div>`;
  }).join('');
}

function sRenderCS(id){
  const c=CONTENT.chars[id];
  g(id+'__csv').innerHTML=c.customSections.map(sec=>`<div style="margin-bottom:.5rem;"><div class="slabel">${sec.title}</div>${
    sec.items.length===0?'<span class="empty-note">None</span>':
    sec.items.map(it=>`<span class="item-tag"><span style="color:#222;font-weight:500;">${it.name}</span>${it.note?`<span style="color:#aaa;font-size:11px;">· ${it.note}</span>`:''}</span>`).join('')
  }</div>`).join('');
  g(id+'__cse').innerHTML=c.customSections.map((sec,si)=>`<div style="margin-bottom:16px;padding:12px;background:#f9f9f9;border-radius:10px;border:1px solid #eee;">
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;">
      <span style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;font-family:sans-serif;">Tab</span>
      <input type="text" value="${esc(sec.title)}" onchange="CONTENT.chars['${id}'].customSections[${si}].title=this.value;sRenderCS('${id}');saveChars();" style="font-weight:bold;flex:1;">
      <button class="rmbtn" onclick="CONTENT.chars['${id}'].customSections.splice(${si},1);sRenderCS('${id}');saveChars();">✕</button>
    </div>
    ${sec.items.map((it,ii)=>`<div class="item-row-e">
      <div style="flex:1;display:flex;flex-direction:column;gap:4px;">
        <input type="text" value="${esc(it.name)}" onchange="CONTENT.chars['${id}'].customSections[${si}].items[${ii}].name=this.value;sRenderCS('${id}');saveChars();">
        <input type="text" value="${esc(it.note)}" onchange="CONTENT.chars['${id}'].customSections[${si}].items[${ii}].note=this.value;sRenderCS('${id}');saveChars();" style="font-size:11px;" placeholder="Note (optional)">
      </div>
      <button class="rmbtn" onclick="CONTENT.chars['${id}'].customSections[${si}].items.splice(${ii},1);sRenderCS('${id}');saveChars();">✕</button>
    </div>`).join('')}
    <button class="add-btn" style="margin-top:8px;" onclick="CONTENT.chars['${id}'].customSections[${si}].items.push({name:'New entry',note:''});sRenderCS('${id}');saveChars();">+ Add to ${sec.title}</button>
  </div>`).join('');
}

function sKarma(id,v){ CONTENT.chars[id].karma=v; const p=((v+500)/1000)*100; g(id+'__kev').style.width=(100-p)+'%'; g(id+'__kgd').style.width=p+'%'; const s=v>=0?'+':''; g(id+'__dkv').textContent=s+v; g(id+'__dkb').textContent=s+v; g(id+'__dkv').style.color=v>=0?'#185FA5':'#A32D2D'; saveChars(); }
function sArcana(id){ const al=g(id+'__eal'),av=g(id+'__eav'); if(al)CONTENT.chars[id].arcanaLabel=al.value; if(av)CONTENT.chars[id].arcanaValue=av.value; g(id+'__dal').textContent=CONTENT.chars[id].arcanaLabel; g(id+'__dav').textContent=CONTENT.chars[id].arcanaValue; g(id+'__dar').style.display=CONTENT.chars[id].arcanaValue?'flex':'none'; saveChars(); }
function sStep(id){ const sl=g(id+'__esl'),sv=g(id+'__esv'); if(sl)CONTENT.chars[id].stepLabel=sl.value; if(sv)CONTENT.chars[id].stepValue=sv.value; g(id+'__dsl').textContent=CONTENT.chars[id].stepLabel; g(id+'__dsv').textContent=CONTENT.chars[id].stepValue; g(id+'__dsr').style.display=CONTENT.chars[id].stepValue?'flex':'none'; saveChars(); }
function sImg(id,url){ CONTENT.chars[id].imgUrl=url; const img=g(id+'__aimg'),ph=g(id+'__aph'); if(url&&url.trim()){img.src=url.trim();img.style.display='block';ph.style.display='none';img.onerror=()=>{img.style.display='none';ph.style.display='flex';};}else{img.style.display='none';ph.style.display='flex';} saveChars(); }
function sApplyEdits(id){ const c=CONTENT.chars[id]; const r=eid=>{const el=g(id+'__'+eid);return el?el.value:'';}; c.number=r('en');c.nameJp=r('ejp');c.nameEn=r('een');c.title=r('eti');c.quote=r('eq');c.footer1=r('ef1');c.footer2=r('ef2');c.appearance=r('eap'); g(id+'__dn').textContent=c.number;g(id+'__djp').textContent=c.nameJp;g(id+'__den').textContent=c.nameEn;g(id+'__dti').textContent=c.title;g(id+'__dq').textContent=c.quote;g(id+'__df1').textContent=c.footer1;g(id+'__df2').textContent=c.footer2;g(id+'__dap').innerHTML=esc(c.appearance).replace(/\n/g,'<br>'); sArcana(id);sStep(id);saveChars();renderCharNav(); }
function sMode(id,mode){ const sh=g(id+'__sheet');sh.classList.remove('vm','em');sh.classList.add(mode);g(id+'__bv').classList.toggle('active',mode==='vm');g(id+'__be').classList.toggle('active',mode==='em');if(mode==='vm')sApplyEdits(id); }
function sAddBI(id){ CONTENT.chars[id].basicInfo.push({label:'New Label',value:''});sRenderBI(id);saveChars(); }
function sAddStat(id){ CONTENT.chars[id].stats.push({name:'New stat',val:50});sRenderStats(id);saveChars(); }
function sAddCS(id){ CONTENT.chars[id].customSections.push({title:'New Category',items:[]});sRenderCS(id);saveChars(); }
function sSaveImg(id){ const btn=event.target;btn.textContent='Saving…';btn.disabled=true;const sh=g(id+'__sheet');const wasEm=sh.classList.contains('em');if(wasEm){sApplyEdits(id);sh.classList.remove('em');sh.classList.add('vm');}html2canvas(sh,{backgroundColor:null,scale:2,useCORS:true,allowTaint:true}).then(c=>{const l=document.createElement('a');l.download=(CONTENT.chars[id].nameEn||'char').toLowerCase().replace(/\s+/g,'-')+'-sheet.png';l.href=c.toDataURL('image/png');l.click();btn.textContent='Save as image';btn.disabled=false;if(wasEm){sh.classList.remove('vm');sh.classList.add('em');}}).catch(()=>{btn.textContent='Save as image';btn.disabled=false;}); }

function initSheet(id){ sRenderBI(id);sRenderStats(id);sRenderCS(id); }

function addCharPage(id){
  const sec=document.createElement('section');
  sec.className='page';
  sec.id='page-char-'+id;
  sec.innerHTML=buildSheetHTML(id);
  g('char-pages').appendChild(sec);
  initSheet(id);
}

function renderCharNav(){
  g('char-nav').innerHTML=CONTENT.charOrder.map(id=>`<div class="ni" onclick="go('char-${id}')"><span class="nd"></span>${esc(CONTENT.chars[id]?CONTENT.chars[id].nameEn:'?')}</div>`).join('');
}

function addChar(){
  const c=BLANK_CHAR();
  CONTENT.chars[c.id]=c;
  CONTENT.charOrder.push(c.id);
  addCharPage(c.id);
  renderCharNav();
  go('char-'+c.id);
  scheduleSave();
}

function delChar(id){
  if(!confirm('Delete this character? Cannot be undone.')) return;
  CONTENT.charOrder=CONTENT.charOrder.filter(x=>x!==id);
  delete CONTENT.chars[id];
  const sec=g('page-char-'+id);
  if(sec) sec.remove();
  renderCharNav();
  go(CONTENT.charOrder.length?'char-'+CONTENT.charOrder[0]:'world');
  scheduleSave();
}

// ── INIT ──────────────────────────────────────────────
CONTENT.charOrder.forEach(id=>addCharPage(id));
renderCharNav();
go('char-'+CONTENT.charOrder[0]);
</script>
</body>
</html>
