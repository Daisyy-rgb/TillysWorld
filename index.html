      html+=`<div class="chap-card"><div class="chap-ey">Chapter ${esc(ch.number)}</div><div class="chap-ti">${esc(ch.title)}</div><div class="chap-bd">${paras}</div></div>`;
    } else {
      html+=`<div class="chap-edit-card">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
          <input value="${esc(ch.number)}" placeholder="No." style="width:70px;font-family:'Cinzel',serif;" oninput="CONTENT.chapters[${i}].number=this.value;scheduleSave();">
          <input value="${esc(ch.title)}" placeholder="Chapter title" style="flex:1;font-family:'Cinzel',serif;font-size:16px;" oninput="CONTENT.chapters[${i}].title=this.value;scheduleSave();">
          <button class="ec-btn" onclick="moveChap(${i},-1)">↑</button>
          <button class="ec-btn" onclick="moveChap(${i},1)">↓</button>
          <button class="ec-btn danger" onclick="CONTENT.chapters.splice(${i},1);renderChaptersPage('${pid}');scheduleSave();">✕</button>
        </div>
        <div style="font-size:10px;color:#999;margin-bottom:4px;font-family:sans-serif;">Separate paragraphs with a blank line</div>
        <textarea oninput="CONTENT.chapters[${i}].body=this.value;scheduleSave();" rows="14">${esc(ch.body||'')}</textarea>
      </div>`;
    }
  });
  if(editMode) html+=`<button class="page-add-btn" onclick="CONTENT.chapters.push({number:'II',title:'New Chapter',body:''});renderChaptersPage('${pid}');scheduleSave();">+ Add chapter</button>`;
  g('render-'+pid).innerHTML=html;
}
function moveChap(idx,dir){const ni=idx+dir,a=CONTENT.chapters;if(ni<0||ni>=a.length)return;[a[idx],a[ni]]=[a[ni],a[idx]];renderChaptersPage('chapters');scheduleSave();}

// ── CALENDAR PAGE ─────────────────────────────────────
function renderCalendarPage(pid){
  const pg=CONTENT.pages[pid];
  let html=editMode
    ?`<div class="ph"><div class="ph-edit-fields"><input value="${esc(pg.title)}" style="font-family:'Cinzel',serif;font-size:22px;color:#e8e2d8;background:#2e2a20;border-color:rgba(255,255,255,.15);" oninput="CONTENT.pages['${pid}'].title=this.value;scheduleSave();"><input value="${esc(pg.subtitle||'')}" style="background:#2e2a20;border-color:rgba(255,255,255,.15);color:rgba(184,173,158,.7);" oninput="CONTENT.pages['${pid}'].subtitle=this.value;scheduleSave();"></div></div>`
    :`<div class="ph"><h1>${esc(pg.title)}</h1><p>${esc(pg.subtitle||'')}</p></div>`;
  if(!editMode){
    html+=`<div class="lb"><div class="lbt">The Free Calendar</div><div class="card"><p>${esc(CONTENT.calendarNote)}</p><h3>Seasons</h3><ul>${CONTENT.seasons.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div></div>
    <div class="lb"><div class="lbt">Currency</div><div class="card"><table class="ctable"><thead><tr><th>Coin</th><th>Material</th><th>Exchange</th></tr></thead><tbody>${CONTENT.currency.map(c=>`<tr><td><strong>${esc(c.name)}</strong></td><td>${esc(c.material)}</td><td>${esc(c.exchange)}</td></tr>`).join('')}</tbody></table></div></div>`;
  } else {
    html+=`<div class="lb"><div class="lbt">The Free Calendar</div><div class="edit-card cal-edit-wrap">
      <label style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.12em;">Calendar note</label>
      <textarea rows="3" oninput="CONTENT.calendarNote=this.value;scheduleSave();">${esc(CONTENT.calendarNote)}</textarea>
      <label style="font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.12em;margin-top:8px;display:block;">Seasons</label>
      <div class="items-edit-wrap">${CONTENT.seasons.map((s,i)=>`<div class="season-edit-row"><input value="${esc(s)}" oninput="CONTENT.seasons[${i}]=this.value;scheduleSave();"><button class="rmbtn" onclick="CONTENT.seasons.splice(${i},1);renderCalendarPage('${pid}');scheduleSave();">✕</button></div>`).join('')}</div>
      <button class="small-add-btn" onclick="CONTENT.seasons.push('New Season');renderCalendarPage('${pid}');scheduleSave();">+ Add season</button>
    </div></div>
    <div class="lb"><div class="lbt">Currency</div><div class="edit-card">
      ${CONTENT.currency.map((c,i)=>`<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
        <input value="${esc(c.name)}" placeholder="Name" style="width:90px;font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;font-weight:bold;" oninput="CONTENT.currency[${i}].name=this.value;scheduleSave();">
        <input value="${esc(c.material)}" placeholder="Material" style="flex:1;font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;" oninput="CONTENT.currency[${i}].material=this.value;scheduleSave();">
        <input value="${esc(c.exchange)}" placeholder="Exchange" style="flex:2;font-size:12px;padding:4px 7px;border-radius:5px;border:1px solid #ccc;background:#faf9f5;" oninput="CONTENT.currency[${i}].exchange=this.value;scheduleSave();">
        <button class="rmbtn" onclick="CONTENT.currency.splice(${i},1);renderCalendarPage('${pid}');scheduleSave();">✕</button>
      </div>`).join('')}
      <button class="small-add-btn" onclick="CONTENT.currency.push({name:'New',material:'',exchange:''});renderCalendarPage('${pid}');scheduleSave();">+ Add currency</button>
    </div></div>`;
  }
  g('render-'+pid).innerHTML=html;
}

// ── CHARACTER SHEETS ──────────────────────────────────
const BLANK_CHAR=()=>({id:uid(),number:'02',nameJp:'',nameEn:'New Character',title:'',arcanaLabel:'Arcana',arcanaValue:'',stepLabel:'Step',stepValue:'',imgUrl:'',appearance:'',quote:'',footer1:'',footer2:'993 A.G. — Springtide',karma:0,basicInfo:[{label:'Age',value:''},{label:'Alignment',value:''}],stats:[{name:'New stat',val:50}],customSections:[]});
function saveChars(){scheduleSave();}

function buildSheetHTML(id){
  const c=CONTENT.chars[id];
  const kP=((c.karma+500)/1000)*100;
  return `<div class="sheet-wrap">
    <div class="sheet-toolbar">
      <button class="mode-btn active" id="${id}__bv" onclick="sMode('${id}','vm')">View</button>
      <button class="mode-btn" id="${id}__be" onclick="sMode('${id}','em')">Edit</button>
      <button class="tbtn tbtn-img" onclick="sSaveImg('${id}')">Save as image</button>
      ${id!=='tilly'?`<button class="tbtn tbtn-del" onclick="delChar('${id}')">Delete</button>`:''}
    </div>
    <div class="sheet vm" id="${id}__sheet">
      <div class="char-number display" id="${id}__dn">${esc(c.number)}</div>
      <div class="top-label">Character</div>
      <div class="display">
        <div class="njp" id="${id}__djp">${esc(c.nameJp)}</div>
        <div class="nen" id="${id}__den">${esc(c.nameEn)}</div>
        <div class="ntitle" id="${id}__dti">${esc(c.title)}</div>
        <div id="${id}__dar" style="display:${c.arcanaValue?'flex':'none'};align-items:baseline;gap:8px;margin-bottom:.5rem;padding:8px 0 0;">
          <span id="${id}__dal" style="font-family:sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#aaa;min-width:90px;flex-shrink:0;">${esc(c.arcanaLabel)}</span>
          <span id="${id}__dav" style="font-family:'Cinzel',serif;font-size:16px;color:#3C3489;letter-spacing:.05em;">${esc(c.arcanaValue)}</span>
        </div>
        <div id="${id}__dsr" style="display:${c.stepValue?'flex':'none'};align-items:baseline;gap:8px;margin-bottom:1rem;padding:4px 0 8px;border-bottom:1px solid #eee;">
          <span id="${id}__dsl" style="font-family:sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#aaa;min-width:90px;flex-shrink:0;">${esc(c.stepLabel)}</span>
          <span id="${id}__dsv" style="font-family:'Cinzel',serif;font-size:15px;color:#555;letter-spacing:.05em;">${esc(c.stepValue)}</span>
        </div>
      </div>
      <div class="editable" style="margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid #eee;">
        <div class="frow"><span class="flabel">Char no.</span><input type="text" id="${id}__en" value="${esc(c.number)}" style="width:60px;"></div>
        <div class="frow"><span class="flabel">Name (JP)</span><input type="text" id="${id}__ejp" value="${esc(c.nameJp)}"></div>
        <div class="frow"><span class="flabel">Name (EN)</span><input type="text" id="${id}__een" value="${esc(c.nameEn)}"></div>
        <div class="frow"><span class="flabel">Title</span><input type="text" id="${id}__eti" value="${esc(c.title)}"></div>
        <div class="frow">
          <input type="text" id="${id}__eal" value="${esc(c.arcanaLabel)}" style="width:90px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0;" oninput="sArcana('${id}')">
          <input type="text" id="${id}__eav" value="${esc(c.arcanaValue)}" placeholder="e.g. The Star" oninput="sArcana('${id}')" style="flex:1;">
        </div>
        <div class="frow">
          <input type="text" id="${id}__esl" value="${esc(c.stepLabel)}" style="width:90px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0;" oninput="sStep('${id}')">
          <input type="text" id="${id}__esv" value="${esc(c.stepValue)}" placeholder="e.g. Candlebearer" oninput="sStep('${id}')" style="flex:1;">
        </div>
      </div>
      <div class="two-col">
        <div>
          <div id="${id}__biv" class="display"></div>
          <div id="${id}__bie" class="editable"></div>
          <button class="add-btn editable" onclick="sAddBI('${id}')">+ Add info field</button>
          <hr class="div">
          <div class="slabel">Karma scale</div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
            <span style="font-size:13px;color:#666;font-family:sans-serif;">Alignment value <span class="kbadge">karma <span id="${id}__dkb">${c.karma>=0?'+':''}${c.karma}</span></span></span>
            <span class="karma-value" id="${id}__dkv" style="color:${c.karma>=0?'#185FA5':'#A32D2D'};">${c.karma>=0?'+':''}${c.karma}</span>
          </div>
          <div class="editable" style="margin-bottom:6px;">
            <input type="range" min="-500" max="500" step="1" id="${id}__ek" value="${c.karma}" style="width:100%;" oninput="sKarma('${id}',parseInt(this.value))">
          </div>
          <div class="karma-track">
            <div class="karma-evil" id="${id}__kev" style="width:${100-kP}%;"></div>
            <div class="karma-good" id="${id}__kgd" style="width:${kP}%;"></div>
          </div>
          <div class="karma-labels"><span class="karma-label-evil">Supreme Evil −500</span><span class="karma-label-good">Supreme Good +500</span></div>
          <hr class="div">
          <div id="${id}__csv" class="display"></div>
          <div id="${id}__cse" class="editable"></div>
          <button class="add-btn editable" onclick="sAddCS('${id}')">+ Add Category Tab</button>
        </div>
        <div>
          <div class="art-frame">
            <div class="art-ph" id="${id}__aph" style="${c.imgUrl?'display:none':'display:flex'}">
              <span style="font-size:28px;opacity:.3;">🖼</span><span>Paste an image URL in edit mode</span>
            </div>
            <img class="art-img" id="${id}__aimg" src="${esc(c.imgUrl)}" alt="" style="${c.imgUrl?'display:block':'display:none'}"
              onerror="this.style.display='none';g('${id}__aph').style.display='flex';">
          </div>
          <div class="editable" style="margin-top:8px;">
            <input type="text" id="${id}__eiu" value="${esc(c.imgUrl)}" placeholder="https://..." oninput="sImg('${id}',this.value)">
            <div class="url-hint">Paste a direct image URL</div>
          </div>
          <div style="margin-top:10px;">
            <div class="display" id="${id}__dap" style="font-size:11px;font-family:sans-serif;color:#aaa;text-align:center;line-height:1.6;">${esc(c.appearance).replace(/\n/g,'<br>')}</div>
            <div class="editable"><textarea id="${id}__eap">${esc(c.appearance)}</textarea></div>
          </div>
        </div>
      </div>
      <hr class="div">
      <div style="margin-bottom:.7rem;">
        <div class="slabel">Character</div>
        <p class="trait-block display" id="${id}__dq">${esc(c.quote)}</p>
        <div class="editable"><textarea id="${id}__eq">${esc(c.quote)}</textarea></div>
      </div>
      <hr class="div">
      <div class="slabel">Status</div>
      <div id="${id}__stv"></div>
      <div id="${id}__ste" class="editable"></div>
      <button class="add-btn editable" onclick="sAddStat('${id}')">+ Add stat</button>
      <hr class="div">
      <div class="footer-row">
        <span class="display" id="${id}__df1">${esc(c.footer1)}</span>
        <span class="display" id="${id}__df2">${esc(c.footer2)}</span>
        <input type="text" id="${id}__ef1" class="editable" value="${esc(c.footer1)}" style="width:48%;">
        <input type="text" id="${id}__ef2" class="editable" value="${esc(c.footer2)}" style="width:48%;">
      </div>
    </div>
  </div>`;
}

function sRenderBI(id){const c=CONTENT.chars[id];g(id+'__biv').innerHTML=c.basicInfo.map(bi=>`<div class="info-row"><span class="info-label">${bi.label}</span><span class="info-value">${bi.value}</span></div>`).join('');g(id+'__bie').innerHTML=c.basicInfo.map((bi,i)=>`<div class="frow"><input type="text" value="${esc(bi.label)}" style="width:90px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;flex-shrink:0;" onchange="CONTENT.chars['${id}'].basicInfo[${i}].label=this.value;sRenderBI('${id}');saveChars();"><input type="text" value="${esc(bi.value)}" style="flex:1;" onchange="CONTENT.chars['${id}'].basicInfo[${i}].value=this.value;sRenderBI('${id}');saveChars();"><button class="rmbtn" onclick="CONTENT.chars['${id}'].basicInfo.splice(${i},1);sRenderBI('${id}');saveChars();">✕</button></div>`).join('');}
function sRenderStats(id){const c=CONTENT.chars[id];g(id+'__stv').innerHTML=c.stats.map(s=>{const n=parseFloat(s.val),p=Math.min(isNaN(n)?0:n,100);return`<div class="stat-row-v"><span class="stat-name">${s.name}</span><div class="stat-bg"><div class="stat-fill" style="width:${p}%"></div></div><span class="stat-val">${s.val}</span></div>`;}).join('');g(id+'__ste').innerHTML=c.stats.map((s,i)=>{const nv=isNaN(parseFloat(s.val))?50:Math.min(Math.max(parseFloat(s.val),0),100);return`<div class="stat-row-e"><input type="text" value="${esc(s.name)}" onchange="CONTENT.chars['${id}'].stats[${i}].name=this.value;sRenderStats('${id}');saveChars();" style="width:110px;flex-shrink:0;"><input type="range" min="0" max="100" step="1" value="${nv}" oninput="CONTENT.chars['${id}'].stats[${i}].val=parseInt(this.value);this.nextElementSibling.value=this.value;sRenderStats('${id}');saveChars();" style="flex:1;min-width:60px;"><input type="text" value="${esc(String(s.val))}" onchange="CONTENT.chars['${id}'].stats[${i}].val=this.value;sRenderStats('${id}');saveChars();" style="width:52px;flex-shrink:0;text-align:center;"><button class="rmbtn" onclick="CONTENT.chars['${id}'].stats.splice(${i},1);sRenderStats('${id}');saveChars();">✕</button></div>`;}).join('');}
function sRenderCS(id){const c=CONTENT.chars[id];g(id+'__csv').innerHTML=c.customSections.map(sec=>`<div style="margin-bottom:.5rem;"><div class="slabel">${sec.title}</div>${sec.items.length===0?'<span class="empty-note">None</span>':sec.items.map(it=>`<span class="item-tag"><span style="color:#222;font-weight:500;">${it.name}</span>${it.note?`<span style="color:#aaa;font-size:11px;">· ${it.note}</span>`:''}</span>`).join('')}</div>`).join('');g(id+'__cse').innerHTML=c.customSections.map((sec,si)=>`<div style="margin-bottom:16px;padding:12px;background:#f9f9f9;border-radius:10px;border:1px solid #eee;"><div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;"><span style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.1em;font-family:sans-serif;">Tab</span><input type="text" value="${esc(sec.title)}" onchange="CONTENT.chars['${id}'].customSections[${si}].title=this.value;sRenderCS('${id}');saveChars();" style="font-weight:bold;flex:1;"><button class="rmbtn" onclick="CONTENT.chars['${id}'].customSections.splice(${si},1);sRenderCS('${id}');saveChars();">✕</button></div>${sec.items.map((it,ii)=>`<div class="item-row-e"><div style="flex:1;display:flex;flex-direction:column;gap:4px;"><input type="text" value="${esc(it.name)}" onchange="CONTENT.chars['${id}'].customSections[${si}].items[${ii}].name=this.value;sRenderCS('${id}');saveChars();"><input type="text" value="${esc(it.note)}" onchange="CONTENT.chars['${id}'].customSections[${si}].items[${ii}].note=this.value;sRenderCS('${id}');saveChars();" style="font-size:11px;" placeholder="Note (optional)"></div><button class="rmbtn" onclick="CONTENT.chars['${id}'].customSections[${si}].items.splice(${ii},1);sRenderCS('${id}');saveChars();">✕</button></div>`).join('')}<button class="add-btn" style="margin-top:8px;" onclick="CONTENT.chars['${id}'].customSections[${si}].items.push({name:'New entry',note:''});sRenderCS('${id}');saveChars();">+ Add to ${sec.title}</button></div>`).join('');}
function sKarma(id,v){CONTENT.chars[id].karma=v;const p=((v+500)/1000)*100;g(id+'__kev').style.width=(100-p)+'%';g(id+'__kgd').style.width=p+'%';const s=v>=0?'+':'';g(id+'__dkv').textContent=s+v;g(id+'__dkb').textContent=s+v;g(id+'__dkv').style.color=v>=0?'#185FA5':'#A32D2D';saveChars();}
function sArcana(id){const al=g(id+'__eal'),av=g(id+'__eav');if(al)CONTENT.chars[id].arcanaLabel=al.value;if(av)CONTENT.chars[id].arcanaValue=av.value;g(id+'__dal').textContent=CONTENT.chars[id].arcanaLabel;g(id+'__dav').textContent=CONTENT.chars[id].arcanaValue;g(id+'__dar').style.display=CONTENT.chars[id].arcanaValue?'flex':'none';saveChars();}
function sStep(id){const sl=g(id+'__esl'),sv=g(id+'__esv');if(sl)CONTENT.chars[id].stepLabel=sl.value;if(sv)CONTENT.chars[id].stepValue=sv.value;g(id+'__dsl').textContent=CONTENT.chars[id].stepLabel;g(id+'__dsv').textContent=CONTENT.chars[id].stepValue;g(id+'__dsr').style.display=CONTENT.chars[id].stepValue?'flex':'none';saveChars();}
function sImg(id,url){CONTENT.chars[id].imgUrl=url;const img=g(id+'__aimg'),ph=g(id+'__aph');if(url&&url.trim()){img.src=url.trim();img.style.display='block';ph.style.display='none';img.onerror=()=>{img.style.display='none';ph.style.display='flex';};}else{img.style.display='none';ph.style.display='flex';}saveChars();}
function sApplyEdits(id){const c=CONTENT.chars[id];const r=eid=>{const el=g(id+'__'+eid);return el?el.value:'';};c.number=r('en');c.nameJp=r('ejp');c.nameEn=r('een');c.title=r('eti');c.quote=r('eq');c.footer1=r('ef1');c.footer2=r('ef2');c.appearance=r('eap');g(id+'__dn').textContent=c.number;g(id+'__djp').textContent=c.nameJp;g(id+'__den').textContent=c.nameEn;g(id+'__dti').textContent=c.title;g(id+'__dq').textContent=c.quote;g(id+'__df1').textContent=c.footer1;g(id+'__df2').textContent=c.footer2;g(id+'__dap').innerHTML=esc(c.appearance).replace(/\n/g,'<br>');sArcana(id);sStep(id);saveChars();buildNav();}
function sMode(id,mode){const sh=g(id+'__sheet');sh.classList.remove('vm','em');sh.classList.add(mode);g(id+'__bv').classList.toggle('active',mode==='vm');g(id+'__be').classList.toggle('active',mode==='em');if(mode==='vm')sApplyEdits(id);}
function sAddBI(id){CONTENT.chars[id].basicInfo.push({label:'New Label',value:''});sRenderBI(id);saveChars();}
function sAddStat(id){CONTENT.chars[id].stats.push({name:'New stat',val:50});sRenderStats(id);saveChars();}
function sAddCS(id){CONTENT.chars[id].customSections.push({title:'New Category',items:[]});sRenderCS(id);saveChars();}
function sSaveImg(id){const btn=event.target;btn.textContent='Saving…';btn.disabled=true;const sh=g(id+'__sheet');const wasEm=sh.classList.contains('em');if(wasEm){sApplyEdits(id);sh.classList.remove('em');sh.classList.add('vm');}html2canvas(sh,{backgroundColor:null,scale:2,useCORS:true,allowTaint:true}).then(c=>{const l=document.createElement('a');l.download=(CONTENT.chars[id].nameEn||'char').toLowerCase().replace(/\s+/g,'-')+'-sheet.png';l.href=c.toDataURL('image/png');l.click();btn.textContent='Save as image';btn.disabled=false;if(wasEm){sh.classList.remove('vm');sh.classList.add('em');}}).catch(()=>{btn.textContent='Save as image';btn.disabled=false;});}
function initSheet(id){sRenderBI(id);sRenderStats(id);sRenderCS(id);}

function addCharPage(id){
  const sec=document.createElement('section');
  sec.className='page';sec.id='page-char-'+id;
  sec.innerHTML=buildSheetHTML(id);
  g('char-pages').appendChild(sec);
  initSheet(id);
}
function addChar(groupId){
  const c=BLANK_CHAR();
  CONTENT.chars[c.id]=c;
  CONTENT.charOrder.push(c.id);
  const grp=CONTENT.charGroups.find(gr=>gr.id===groupId);
  if(grp)grp.chars.push(c.id);
  addCharPage(c.id);
  buildNav();
  go('char-'+c.id);
  scheduleSave();
}
function delChar(id){
  if(!confirm('Delete this character? Cannot be undone.'))return;
  CONTENT.charOrder=CONTENT.charOrder.filter(x=>x!==id);
  CONTENT.charGroups.forEach(grp=>{grp.chars=grp.chars.filter(cid=>cid!==id);});
  delete CONTENT.chars[id];
  const sec=g('page-char-'+id);if(sec)sec.remove();
  buildNav();
  go(CONTENT.charOrder[0]?'char-'+CONTENT.charOrder[0]:'world');
  scheduleSave();
}

// ── INIT ──────────────────────────────────────────────
migrateContent();
initPages();
CONTENT.charOrder.forEach(id=>addCharPage(id));
buildNav();
go(CONTENT.charOrder[0]?'char-'+CONTENT.charOrder[0]:'world');
</script>
</body>
</html>
